# CI/CD Performance Testing Configuration
# GitHub Actions workflow for automated performance testing

name: Performance Testing Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run nightly performance tests at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      test_level:
        description: "Performance test level"
        required: true
        default: "standard"
        type: choice
        options:
          - standard
          - comprehensive
          - stress

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  performance-baseline:
    name: Performance Baseline Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-json-report

      - name: Run baseline performance tests
        run: |
          python -m pytest tests/performance/test_concurrent_agents.py::TestConcurrentAgents::test_single_agent_creation_latency -v --json-report --json-report-file=baseline_report.json

      - name: Upload baseline results
        uses: actions/upload-artifact@v3
        with:
          name: baseline-performance-results
          path: baseline_report.json

  performance-standard:
    name: Standard Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: performance-baseline

    strategy:
      matrix:
        test_module:
          - test_concurrent_agents
          - test_message_queue_load
          - test_database_benchmarks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-json-report psutil

      - name: Run performance tests
        run: |
          python -m pytest tests/performance/${{ matrix.test_module }}.py -v --json-report --json-report-file=${{ matrix.test_module }}_report.json
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: standard-performance-results-${{ matrix.test_module }}
          path: ${{ matrix.test_module }}_report.json

  performance-comprehensive:
    name: Comprehensive Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event.inputs.test_level == 'comprehensive' || github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-json-report psutil websockets

      - name: Run comprehensive performance suite
        run: |
          cd tests/performance
          python load_test_runner.py
        continue-on-error: true

      - name: Upload comprehensive results
        uses: actions/upload-artifact@v3
        with:
          name: comprehensive-performance-results
          path: |
            performance_test_report.json
            performance_summary.csv
            performance_dashboard.html

  performance-stress:
    name: Stress Testing
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event.inputs.test_level == 'stress'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-json-report psutil websockets

      - name: Run stress tests
        run: |
          python -m pytest tests/performance/ -m stress -v --json-report --json-report-file=stress_test_report.json
        continue-on-error: true

      - name: Upload stress test results
        uses: actions/upload-artifact@v3
        with:
          name: stress-test-results
          path: stress_test_report.json

  performance-analysis:
    name: Performance Analysis & Reporting
    runs-on: ubuntu-latest
    needs: [performance-standard, performance-comprehensive]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib seaborn jinja2

      - name: Generate performance analysis report
        run: |
          python tests/performance/generate_ci_report.py
        continue-on-error: true

      - name: Upload analysis report
        uses: actions/upload-artifact@v3
        with:
          name: performance-analysis-report
          path: |
            ci_performance_report.html
            performance_trends.png
            ci_performance_analysis.json

      - name: Comment PR with performance results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');

            try {
              const report = JSON.parse(fs.readFileSync('ci_performance_analysis.json', 'utf8'));

              const comment = `## 🚀 Performance Test Results

              **Overall Score:** ${report.overall_score}% (${report.status})

              ### Key Metrics
              - Agent Scalability: ${report.agent_scalability ? '✅' : '❌'}
              - Message Throughput: ${report.message_throughput ? '✅' : '❌'}
              - Database Performance: ${report.database_performance ? '✅' : '❌'}

              ### Recommendations
              ${report.recommendations.slice(0, 3).map(r => `- ${r}`).join('\n')}

              [View Full Report](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Could not create performance comment:', error);
            }

  performance-dashboard-deploy:
    name: Deploy Performance Dashboard
    runs-on: ubuntu-latest
    needs: [performance-analysis]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download analysis artifacts
        uses: actions/download-artifact@v3
        with:
          name: performance-analysis-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: performance
          keep_files: true

  performance-alerts:
    name: Performance Alerts
    runs-on: ubuntu-latest
    needs: [performance-analysis]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Download analysis artifacts
        uses: actions/download-artifact@v3
        with:
          name: performance-analysis-report

      - name: Check performance degradation
        run: |
          python -c "
          import json
          import sys

          try:
              with open('ci_performance_analysis.json', 'r') as f:
                  report = json.load(f)

              score = report.get('overall_score', 0)
              critical_failures = report.get('critical_failures', [])

              if score < 75:
                  print(f'ALERT: Performance score dropped to {score}%')
                  sys.exit(1)

              if critical_failures:
                  print(f'ALERT: Critical performance failures: {critical_failures}')
                  sys.exit(1)

              print(f'Performance is acceptable: {score}%')

          except Exception as e:
              print(f'Could not analyze performance: {e}')
              sys.exit(1)
          "

      - name: Send Slack notification on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "🚨 Performance degradation detected in main branch!"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

# Performance test configuration
performance_config:
  thresholds:
    agent_creation_ms: 100
    message_send_ms: 100
    websocket_connection_ms: 1000
    database_query_ms: 50
    vision_chunking_ms: 5000
    concurrent_agents: 100
    messages_per_minute: 10000

  test_environments:
    - name: "standard"
      agents: 50
      duration: 300 # 5 minutes
    - name: "production"
      agents: 100
      duration: 600 # 10 minutes
    - name: "stress"
      agents: 150
      duration: 900 # 15 minutes

  reporting:
    dashboard_enabled: true
    slack_notifications: true
    email_alerts: true
    trend_analysis: true
