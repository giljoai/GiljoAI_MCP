<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GiljoAI — System Status</title>
  <meta name="description" content="Live operational status for GiljoAI." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600;700&family=Roboto:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /*
     * GiljoAI status page — built to the authoritative design system
     * (frontend/design-system-sample-v2.html). A standalone Pages asset can't
     * import the SCSS, so the canonical tokens are mirrored as CSS custom
     * properties here — same approach the fallback Worker uses. Smooth borders
     * use inset box-shadow (never CSS border on rounded elements) per §8.
     */
    :root {
      /* Surfaces (§9) */
      --flat: #0e1c2d;
      --raised: #12202e;
      --elevated: #1e3147;
      --overlay: #243b53;
      /* Text (§1) */
      --text-primary: #e1e1e1;
      --text-secondary: #a3aac4;
      --text-muted: #8895a8;
      /* Brand + status (§1, §15) */
      --brand: #ffc300;
      --up: #67bd6d;          /* success/complete */
      --degraded: #ff9800;    /* warning/blocked */
      --down: #c6298c;        /* error/danger */
      --idle: #9e9e9e;        /* inactive */
      /* Smooth borders (§8) */
      --sb-1: inset 0 0 0 1px rgba(255, 255, 255, 0.10);
      --sb-2: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
      /* Shadows */
      --shadow-card: 0 8px 28px rgba(0, 0, 0, 0.40);
      --shadow-hover: 0 14px 38px rgba(0, 0, 0, 0.52);
      /* Brand gradient (§15) */
      --grad: linear-gradient(45deg, #ffd93d, #6bcf7f);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(900px 480px at 50% -8%, rgba(255, 195, 0, 0.05), transparent 70%),
        var(--flat);
      color: var(--text-primary);
      font-family: "Roboto", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 40px;
      -webkit-font-smoothing: antialiased;
    }

    .wrap { width: 100%; max-width: 680px; }

    /* ── Header ───────────────────────────────────────────── */
    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 6px;
    }
    .brand-logo {
      width: 44px; height: 44px;
      background: var(--raised);
      border-radius: 12px;
      box-shadow: var(--sb-1);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .brand-logo svg { width: 30px; height: 30px; display: block; }
    .brand-name {
      font-family: "Outfit", sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: -0.4px;
      color: var(--brand);
      line-height: 1;
    }
    .brand-sub {
      font-family: "Outfit", sans-serif;
      font-weight: 500;
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .grad-bar {
      height: 3px;
      width: 100%;
      background: var(--grad);
      border-radius: 2px;
      margin: 18px 0 26px;
      opacity: 0.9;
    }

    /* ── Hero summary ─────────────────────────────────────── */
    .summary {
      position: relative;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 26px 28px;
      background: var(--raised);
      border-radius: 16px;
      box-shadow: var(--sb-1), var(--shadow-card);
      overflow: hidden;
      margin-bottom: 18px;
      transition: box-shadow 0.3s ease;
    }
    /* state accent strip down the left edge */
    .summary::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--state, var(--idle));
      transition: background 0.3s ease;
    }
    .summary-glow {
      position: absolute;
      right: -40px; top: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: var(--state, var(--idle));
      opacity: 0.07;
      filter: blur(20px);
      transition: background 0.3s ease;
      pointer-events: none;
    }
    .dot {
      position: relative;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--state, var(--idle));
      flex-shrink: 0;
      transition: background 0.3s ease;
    }
    .dot::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: var(--state, var(--idle));
      opacity: 0.35;
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(0.7); opacity: 0.45; }
      70%  { transform: scale(1.9); opacity: 0; }
      100% { transform: scale(1.9); opacity: 0; }
    }
    .summary-text { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .summary-title {
      font-family: "Outfit", sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      line-height: 1.2;
      color: var(--state, var(--text-primary));
      transition: color 0.3s ease;
    }
    .summary-sub { font-size: 0.85rem; color: var(--text-secondary); }

    /* ── Components panel ─────────────────────────────────── */
    .panel {
      background: var(--raised);
      border-radius: 16px;
      box-shadow: var(--sb-1);
      overflow: hidden;
    }
    .panel-head {
      font-family: "Roboto", sans-serif;
      font-weight: 500;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 14px 22px 0;
    }
    .component {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 22px 18px;
    }
    .component-id { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .component-name { font-size: 0.95rem; font-weight: 500; color: var(--text-primary); }
    .component-host {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .component-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

    /* tinted status chip (§3/§14): rgba(color,.15) bg + bright text, pill */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 13px;
      border-radius: 9999px;
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      white-space: nowrap;
      color: var(--state, var(--idle));
      background: color-mix(in srgb, var(--state, var(--idle)) 15%, transparent);
      transition: color 0.3s ease, background 0.3s ease;
    }
    .chip-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .latency {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
    }

    /* ── Uptime micro-bar (§7) ────────────────────────────── */
    .uptime {
      padding: 0 22px 20px;
    }
    .uptime-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .uptime-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .uptime-pct {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.72rem;
      color: var(--text-secondary);
    }
    .micro-bar {
      display: flex;
      gap: 3px;
      height: 26px;
    }
    .seg {
      flex: 1;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.06);
      transition: background 0.3s ease;
    }
    .seg.up { background: var(--up); }
    .seg.degraded { background: var(--degraded); }
    .seg.down { background: var(--down); }

    /* ── Footer ───────────────────────────────────────────── */
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
      padding: 0 4px;
    }
    .meta-left {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      box-shadow: var(--sb-2);
      color: var(--text-secondary);
      border: 0;
      border-radius: 9999px;
      padding: 7px 15px;
      font-family: "Roboto", sans-serif;
      font-size: 0.74rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }
    .refresh-btn:hover {
      color: var(--brand);
      background: rgba(255, 195, 0, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 195, 0, 0.35);
    }
    .refresh-btn .spin { width: 13px; height: 13px; display: inline-block; }
    .refresh-btn.loading .spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tagline {
      text-align: center;
      margin-top: 30px;
      font-family: "Outfit", sans-serif;
      font-weight: 300;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .foot-links {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 14px;
      font-size: 0.75rem;
    }
    .foot-links a { color: var(--brand); text-decoration: none; font-weight: 500; }
    .foot-links a:hover { text-decoration: underline; }
    .foot-grad {
      height: 3px;
      width: 120px;
      margin: 22px auto 0;
      background: var(--grad);
      border-radius: 2px;
      opacity: 0.85;
    }

    @media (max-width: 520px) {
      body { padding: 36px 16px; }
      .summary-title { font-size: 1.2rem; }
      .component { flex-wrap: wrap; }
      .component-right { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <!-- Header -->
    <div class="brand">
      <span class="brand-logo">
        <!-- GiljoAI face logomark (frontend/public/giljo_YW_Face.svg) -->
        <svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#ffc300" d="M226.87,73.06c-2.29-7.5-5.95-14.44-10.99-20.83-5.04-6.39-11.66-11.69-19.86-15.91s-18.17-6.33-29.88-6.33h-82.44c-6.33,0-13.24,1.12-20.74,3.34-7.5,2.23-14.44,5.89-20.83,10.99-6.39,5.1-11.72,11.72-16,19.86-4.28,8.15-6.42,18.08-6.42,29.79v61.88c0,11.84,2.14,21.83,6.42,29.97,4.28,8.15,9.61,14.77,16,19.86,6.39,5.1,13.33,8.76,20.83,10.99,7.5,2.23,14.41,3.34,20.74,3.34h82.44c4.33,0,8.93-.5,13.8-1.49,4.86-.99,9.67-2.55,14.41-4.66s9.29-4.83,13.62-8.17,8.14-7.38,11.43-12.13c3.28-4.75,5.92-10.25,7.91-16.52s2.99-13.33,2.99-21.18v-61.88c0-6.44-1.14-13.42-3.43-20.92h0ZM184.59,155.85c0,5.98-1.52,10.55-4.57,13.71s-7.68,4.75-13.89,4.75h-82.09c-6.09,0-10.72-1.58-13.89-4.75s-4.75-7.73-4.75-13.71v-61.88c0-5.98,1.58-10.52,4.75-13.62,3.16-3.1,7.79-4.66,13.89-4.66h82.09c5.98,0,10.55,1.52,13.71,4.57s4.75,7.73,4.75,14.06v61.52h0Z"/>
          <circle fill="#e1e1e1" cx="93.87" cy="148.51" r="19.5"/>
          <circle fill="#e1e1e1" cx="138.37" cy="148.51" r="19.5"/>
        </svg>
      </span>
      <span>
        <span class="brand-name">GiljoAI</span>
        <span class="brand-sub">System Status</span>
      </span>
    </div>
    <div class="grad-bar"></div>

    <!-- Hero summary -->
    <section id="summary" class="summary" role="status" aria-live="polite">
      <span class="summary-glow" aria-hidden="true"></span>
      <span class="dot" aria-hidden="true"></span>
      <span class="summary-text">
        <span id="summary-title" class="summary-title">Checking status&hellip;</span>
        <span id="summary-sub" class="summary-sub">Contacting app.giljo.ai</span>
      </span>
    </section>

    <!-- Components -->
    <section class="panel" aria-label="Components">
      <div class="panel-head">Components</div>
      <div class="component">
        <span class="component-id">
          <span class="component-name">GiljoAI App</span>
          <span class="component-host">app.giljo.ai</span>
        </span>
        <span class="component-right">
          <span id="app-chip" class="chip">
            <span class="chip-dot" aria-hidden="true"></span>
            <span id="app-chip-label">Checking&hellip;</span>
          </span>
          <span id="app-latency" class="latency">&mdash;</span>
        </span>
      </div>

      <!-- Live uptime bar -->
      <div class="uptime">
        <div class="uptime-head">
          <span class="uptime-label">Recent checks</span>
          <span id="uptime-pct" class="uptime-pct">&mdash;</span>
        </div>
        <div id="micro-bar" class="micro-bar" aria-hidden="true"></div>
      </div>
    </section>

    <!-- Footer -->
    <div class="meta">
      <span id="last-checked" class="meta-left">Last checked: &mdash;</span>
      <button id="refresh" class="refresh-btn" type="button">
        <svg class="spin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.64-6.36" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M21 4v5h-5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Refresh
      </button>
    </div>

    <p class="tagline">&ldquo;The context engineering platform for AI-assisted development.&rdquo;</p>
    <div class="foot-links">
      <span style="color:var(--text-muted);">Auto-refreshes every 30s</span>
      <a href="https://app.giljo.ai">Open app &rarr;</a>
    </div>
    <div class="foot-grad"></div>
  </main>

  <script>
    (function () {
      "use strict";

      var POLL_MS = 30000;
      var MAX_SEGMENTS = 40;
      var COPY = {
        up:       { title: "All systems operational", sub: "GiljoAI is up and running.",            chip: "Operational" },
        degraded: { title: "Degraded performance",    sub: "Some health checks are degraded.",       chip: "Degraded" },
        down:     { title: "Service disruption",       sub: "GiljoAI is currently unavailable.",       chip: "Down" },
        unknown:  { title: "Status unavailable",       sub: "Could not determine status.",             chip: "Unknown" }
      };
      var STATE_VAR = { up: "var(--up)", degraded: "var(--degraded)", down: "var(--down)", unknown: "var(--idle)" };

      var els = {
        summary:    document.getElementById("summary"),
        title:      document.getElementById("summary-title"),
        sub:        document.getElementById("summary-sub"),
        chip:       document.getElementById("app-chip"),
        chipLabel:  document.getElementById("app-chip-label"),
        latency:    document.getElementById("app-latency"),
        lastChecked:document.getElementById("last-checked"),
        refresh:    document.getElementById("refresh"),
        microBar:   document.getElementById("micro-bar"),
        uptimePct:  document.getElementById("uptime-pct")
      };
      var history = [];
      var timer = null;

      function renderBar() {
        var frag = "";
        var pad = MAX_SEGMENTS - history.length;
        for (var i = 0; i < pad; i++) frag += '<span class="seg"></span>';
        for (var j = 0; j < history.length; j++) frag += '<span class="seg ' + history[j] + '"></span>';
        els.microBar.innerHTML = frag;

        if (history.length) {
          var good = history.filter(function (s) { return s === "up"; }).length;
          els.uptimePct.textContent = Math.round((good / history.length) * 100) + "% operational";
        }
      }

      function setState(state, detail, latencyMs) {
        var s = COPY[state] ? state : "unknown";
        var copy = COPY[s];
        var color = STATE_VAR[s];

        els.summary.style.setProperty("--state", color);
        els.chip.style.setProperty("--state", color);
        els.title.textContent = copy.title;
        els.sub.textContent = detail || copy.sub;
        els.chipLabel.textContent = copy.chip;
        els.latency.textContent = (typeof latencyMs === "number") ? (latencyMs + " ms") : "—";
      }

      function stamp() {
        els.lastChecked.textContent = "Last checked: " + new Date().toLocaleTimeString();
      }

      function poll() {
        els.refresh.classList.add("loading");
        fetch("/api/health", { cache: "no-store", headers: { accept: "application/json" } })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var s = COPY[data.state] ? data.state : "unknown";
            setState(s, data.detail, data.latencyMs);
            history.push(s === "unknown" ? "down" : s);
            if (history.length > MAX_SEGMENTS) history.shift();
            renderBar();
            stamp();
          })
          .catch(function () {
            setState("unknown", "Status check failed to run.", null);
            history.push("down");
            if (history.length > MAX_SEGMENTS) history.shift();
            renderBar();
            stamp();
          })
          .finally(function () { els.refresh.classList.remove("loading"); });
      }

      els.refresh.addEventListener("click", poll);
      renderBar();
      poll();
      timer = setInterval(poll, POLL_MS);

      // Pause polling when hidden; resume + poll immediately on return.
      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          if (timer) { clearInterval(timer); timer = null; }
        } else if (!timer) {
          poll();
          timer = setInterval(poll, POLL_MS);
        }
      });
    })();
  </script>
</body>
</html>
