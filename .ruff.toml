# Ruff configuration for GiljoAI MCP Coding Orchestrator
# Production-ready Python linting configuration

# Basic settings
line-length = 120
indent-width = 4
target-version = "py39"  # Python 3.9+

# Enable pyflakes, pycodestyle, isort, and more
[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "YTT",  # flake8-2020
    "S",    # flake8-bandit (security)
    "BLE",  # flake8-blind-except
    "FBT",  # flake8-boolean-trap
    "A",    # flake8-builtins
    "COM",  # flake8-commas
    "C90",  # mccabe complexity
    "DJ",   # flake8-django
    "DTZ",  # flake8-datetimez
    "EM",   # flake8-errmsg
    "EXE",  # flake8-executable
    "ISC",  # flake8-implicit-str-concat
    "ICN",  # flake8-import-conventions
    "G",    # flake8-logging-format
    "INP",  # flake8-no-pep420
    "PIE",  # flake8-pie
    "T20",  # flake8-print
    "PYI",  # flake8-pyi
    "PT",   # flake8-pytest-style
    "Q",    # flake8-quotes
    "RSE",  # flake8-raise
    "RET",  # flake8-return
    "SLF",  # flake8-self
    "SIM",  # flake8-simplify
    "TID",  # flake8-tidy-imports
    "TCH",  # flake8-type-checking
    "ARG",  # flake8-unused-arguments
    "PTH",  # flake8-use-pathlib
    "ERA",  # flake8-eradicate
    "PD",   # pandas-vet
    "PGH",  # pygrep-hooks
    "PL",   # Pylint
    "TRY",  # tryceratops
    "FLY",  # flynt
    "PERF", # Perflint
    "RUF",  # Ruff-specific rules
]

ignore = [
    # --- Formatter compatibility ---
    "E501",   # Line too long - handled by black formatter
    "COM812", # Missing trailing comma - handled by formatter
    "ISC001", # Implicit string concatenation - conflicts with formatter

    # --- Security: Test-only false positives ---
    "S101",   # Use of assert detected - required for pytest
    "S105",   # Hardcoded password string - false positives in test fixtures
    "S106",   # Hardcoded password function arg - false positives in test utilities
    "S107",   # Hardcoded password default arg - false positives in test helpers
    "S108",   # Probable insecure usage of temp file - managed by tempfile module

    # --- Security: Reviewed false positives (2026-02-07, Handover 0720) ---
    "S104",   # Bind all interfaces (0.0.0.0) - intentional for local dev server (firewall controls access)
    "S311",   # Non-cryptographic random - UUIDs, port allocation, mock data (no cryptographic use)
    "S603",   # Subprocess without shell - intentionally using shell=False for git/pg_dump (BETTER security)
    "S607",   # Partial executable path - standard system utilities (git, uvx) via PATH lookup
    "S301",   # Pickle usage - internal Redis cache only, trusted data (not deserializing user input)

    # --- Readability preferences (established codebase patterns) ---
    "FBT001", # Boolean positional arg - clarity over strictness in known interfaces
    "FBT002", # Boolean default value - explicit flags are clearer than Optional
    "G004",   # Logging f-string - more readable than % formatting
    "G201",   # Logging .exception vs .error(exc_info=True) - both acceptable
    "TRY003", # Avoid long messages outside exception class - sometimes clearer inline
    "EM101",  # Exception string literals - acceptable for simple errors
    "EM102",  # Exception f-string literals - more readable than concatenation
    "RET504", # Unnecessary variable before return - naming often adds clarity
    "SIM108", # Use ternary operator - not always more readable
    "PTH123", # open() without pathlib - sometimes cleaner for simple cases

    # --- Complexity: Case-by-case review (deferred to focused refactoring) ---
    "C901",   # Function too complex - will address with targeted refactoring
    "PLR0912", # Too many branches - will address with targeted refactoring
    "PLR0915", # Too many statements - will address with targeted refactoring
    "PLR0913", # Too many arguments - sometimes necessary for service layer APIs
    "PLR0911", # Too many return statements - can be clearer than nested conditionals
    "PLR2004", # Magic value comparison - sometimes clearer inline than named constants

    # --- Type checking: Pragmatic defaults ---
    "PGH003", # Use specific rule codes when ignoring type issues - blanket ignore acceptable for vendor code

    # ==================================================================================
    # 0720 DELINTING: Intentional architectural patterns (1221 occurrences)
    # ==================================================================================

    # --- Lazy loading pattern (413 occurrences) ---
    "PLC0415",  # Import outside top-level (module scope)
                # Rationale: Avoid circular imports and reduce startup time via lazy loading
                # Example: def get_manager(): from .manager import Manager; return Manager()
                # This is intentional lazy import pattern, not accidental import placement

    # --- FastAPI dependency injection pattern (325 occurrences) ---
    "B008",     # Function call in default argument
                # Rationale: FastAPI Depends() in defaults is the canonical pattern
                # Example: async def endpoint(db: AsyncSession = Depends(get_db_session))
                # This is not a bug - it's how FastAPI's DI system works

    # --- Error transformation pattern (198 occurrences) ---
    "TRY301",   # Raise within try block
                # Rationale: Catching one exception type and raising a more specific one
                # Example: try: ... except SQLAlchemyError as e: raise DatabaseError(...) from e
                # This is intentional error context enrichment, not accidental re-raising

    # --- Control flow: try-else blocks (102 occurrences) ---
    "TRY300",   # Consider moving statement to else block
                # Rationale: Often false positives where else block would reduce clarity
                # Many cases involve early returns or complex control flow where else is awkward

    # --- API compatibility: Unused arguments (98 occurrences) ---
    "ARG001",   # Unused function argument (42 occurrences)
    "ARG002",   # Unused method argument (54 occurrences)
    "ARG003",   # Unused class method argument (2 occurrences)
                # Rationale: Required for API compatibility, interface contracts, or future use
                # Example: MCP tool signatures require tenant_key even if not used in all implementations
                # Example: Abstract base class methods that subclasses may not need all parameters

    # --- Type annotations: Implicit Optional pattern (45 occurrences) ---
    "RUF013",   # PEP 484 prohibits implicit Optional
                # Rationale: foo: str = None is valid Python and clear in context
                # PEP 484 is advisory, not enforced by runtime. Explicit Optional[str] = None
                # is more verbose without adding clarity in many simple cases

    # --- Testing: Private member access (12 occurrences) ---
    "SLF001",   # Private member accessed
                # Rationale: Tests need to verify internal state and setup test fixtures
                # All occurrences are in test files or test helper utilities
                # Per-file-ignores already cover tests/**, but some test utilities are in src/

    # --- Type checking imports: Pedantic optimization (28 occurrences) ---
    "TC001",    # Typing-only first-party import should be in TYPE_CHECKING block (11)
    "TC002",    # Typing-only third-party import should be in TYPE_CHECKING block (4)
    "TC003",    # Typing-only stdlib import should be in TYPE_CHECKING block (4)
    "TC010",    # Runtime string union - move to TYPE_CHECKING (9)
                # Rationale: Micro-optimization with minimal runtime impact
                # TYPE_CHECKING blocks add complexity for marginal import time savings
                # Most imports are used at runtime or in hybrid typing/runtime contexts
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

# Exclude common directories
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
    "build",
    "dist",
    "node_modules",
    "migrations",
    "temp",
    "backups",
    "logs",
    "data",
    ".serena",
    ".giljo-config",
    "dev_tools",
]

# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = false

[lint.mccabe]
max-complexity = 15

[lint.isort]
known-first-party = ["giljo_mcp"]
force-single-line = false
force-sort-within-sections = false
lines-after-imports = 2

[lint.flake8-quotes]
inline-quotes = "double"

[lint.per-file-ignores]
# --- Test files ---
"tests/**/*.py" = [
    "S101",   # Assert allowed in tests
    "ARG",    # Unused arguments in fixtures OK
    "PLR2004", # Magic values OK in tests
    "S311",   # Random OK in tests
    "SLF001", # Private member access OK in tests - need to verify internal state
    "T201",   # Print allowed in test runners, manual tests, and fixtures
    "BLE001", # Broad exception OK in test setup/teardown helpers
]
"**/conftest.py" = [
    "ARG",    # Unused arguments OK in pytest fixtures
    "E402",   # Module-level imports after code - fixture setup may require this
]

# --- Application entry points (logging/config before imports) ---
"api/app.py" = [
    "E402",   # Module-level import not at top - logging configured before imports
    "BLE001", # Broad exception OK for optional startup phase degraded-mode handling
]
"startup.py" = [
    "E402",   # Module-level import not at top - early initialization required
    "T201",   # CLI entry point - print() for user-facing startup output
    "BLE001", # Broad exception OK for graceful startup error handling
]
"api/startup/shutdown.py" = [
    "T201",   # Console progress bars for shutdown steps - print() is intentional
]

# --- CLI scripts and launchers (print() is the user interface) ---
"scripts/**/*.py" = [
    "T201",   # CLI scripts use print() for user-facing output
    "BLE001", # Broad exception OK for graceful error handling in CLI tools
    "INP001", # No __init__.py needed in scripts
]
"launchers/**/*.py" = [
    "T201",   # Launchers use print() for startup messages
    "BLE001", # Broad exception OK for graceful launcher error handling
    "INP001", # No __init__.py needed in launchers
]
"dev_tools/**/*.py" = [
    "T201",   # Dev tools use print() for CLI output
    "BLE001", # Broad exception OK for dev tool error handling
    "INP001", # No __init__.py needed in dev tools
]
"Linux_Installer/**/*.py" = [
    "T201",   # Installer uses print() for user-facing output
    "BLE001", # Broad exception OK for installer error handling
    "INP001", # No __init__.py needed in installer
]
"handovers/**/*.py" = [
    "T201",   # Handover scripts use print() for output
    "BLE001", # Broad exception OK for transient handover scripts
    "INP001", # No __init__.py needed in handovers
]
"frontend/tests/**/*.py" = [
    "T201",   # Test helpers use print() for output
    "INP001", # No __init__.py needed in frontend test helpers
]

# --- Root-level CLI entry points ---
"backup.py" = [
    "T201",   # CLI tool - print() for user-facing backup output
    "BLE001", # Broad exception OK for graceful error handling
    "S606",   # os.startfile is Windows-only, not a shell injection risk
]
"install.py" = [
    "T201",   # CLI installer - print() for user-facing output
    "BLE001", # Broad exception OK for graceful install error handling
]
"update.py" = [
    "T201",   # CLI tool - print() for user-facing update output
    "BLE001", # Broad exception OK for graceful error handling
    "S110",   # try-except-pass intentional for revision existence check
]
"api/startup/migration_check.py" = [
    "BLE001", # Broad exception OK - defensive startup check must never block server
]
"api/startup/update_checker.py" = [
    "BLE001", # Broad exception OK - background task must never crash server
]
"reset.py" = [
    "T201",   # CLI tool - print() for user-facing reset output
    "BLE001", # Broad exception OK for graceful error handling
    "PTH114", # os.path.islink used alongside Path.is_symlink for Windows compat
    "PTH115", # os.readlink used for symlink display in reset output
]
"restart_services.py" = [
    "T201",   # CLI tool - print() for user-facing service restart output
    "BLE001", # Broad exception OK for graceful error handling
    "UP006",  # List[int] annotation — legacy compat, not worth changing
    "UP035",  # typing.List deprecated — same as UP006
    "PERF203", # try-except in loop — psutil process iteration requires it
]
"serve_frontend.py" = [
    "T201",   # CLI tool - print() for user-facing server output
]
"uninstall.py" = [
    "T201",   # CLI tool - print() for user-facing uninstall output
    "BLE001", # Broad exception OK for graceful error handling
]
"startup_prod.py" = [
    "BLE001", # Broad exception OK for graceful production startup error handling
]

# --- Examples and CLI tools ---
"examples/**/*.py" = [
    "T20",    # Print allowed in examples
    "INP001", # No __init__.py needed in examples
]
"setup*.py" = [
    "T20",    # Print allowed in setup scripts
]
"monitor*.py" = [
    "T20",    # Print allowed in monitoring scripts
]
"src/giljo_mcp/cleanup/visualizer.py" = [
    "T201",   # CLI dependency visualization tool - print() is the interface
]
"src/giljo_mcp/database_backup.py" = [
    "T201",   # CLI database backup utility - print() for user feedback
]
"src/giljo_mcp/colored_logger.py" = [
    "T201",   # Public API for colored console output
]
"src/giljo_mcp/services/protocol_sections/agent_lifecycle.py" = [
    "S608",   # False positive — f-string builds agent protocol prompt, not SQL
]

# --- Installation files (transient code, users run once) ---
"bootstrap.py" = ["ALL"]
"setup.py" = ["ALL"]
"setup_gui.py" = ["ALL"]
"installer/**/*.py" = ["ALL"]
"installers/**/*.py" = ["ALL"]

[lint.pylint]
max-args = 8
max-branches = 15
max-returns = 10
max-statements = 50

[lint.flake8-tidy-imports]
ban-relative-imports = "parents"
