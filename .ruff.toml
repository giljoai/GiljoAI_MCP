# Ruff configuration for GiljoAI MCP Coding Orchestrator
# Production-ready Python linting configuration

# Basic settings
line-length = 120
indent-width = 4
target-version = "py39"  # Python 3.9+

# Enable pyflakes, pycodestyle, isort, and more
[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "YTT",  # flake8-2020
    "S",    # flake8-bandit (security)
    "BLE",  # flake8-blind-except
    "FBT",  # flake8-boolean-trap
    "A",    # flake8-builtins
    "COM",  # flake8-commas
    "C90",  # mccabe complexity
    "DJ",   # flake8-django
    "DTZ",  # flake8-datetimez
    "EM",   # flake8-errmsg
    "EXE",  # flake8-executable
    "ISC",  # flake8-implicit-str-concat
    "ICN",  # flake8-import-conventions
    "G",    # flake8-logging-format
    "INP",  # flake8-no-pep420
    "PIE",  # flake8-pie
    "T20",  # flake8-print
    "PYI",  # flake8-pyi
    "PT",   # flake8-pytest-style
    "Q",    # flake8-quotes
    "RSE",  # flake8-raise
    "RET",  # flake8-return
    "SLF",  # flake8-self
    "SIM",  # flake8-simplify
    "TID",  # flake8-tidy-imports
    "TCH",  # flake8-type-checking
    "ARG",  # flake8-unused-arguments
    "PTH",  # flake8-use-pathlib
    "ERA",  # flake8-eradicate
    "PD",   # pandas-vet
    "PGH",  # pygrep-hooks
    "PL",   # Pylint
    "TRY",  # tryceratops
    "FLY",  # flynt
    "PERF", # Perflint
    "RUF",  # Ruff-specific rules
]

ignore = [
    "E501",   # Line too long - handled by formatter
    "S101",   # Use of assert detected - needed for tests
    "S105",   # Hardcoded password - false positives in tests
    "S106",   # Hardcoded password - false positives in tests
    "S107",   # Hardcoded password - false positives in tests
    "S108",   # Probable insecure usage of temp file - managed properly
    "COM812", # Missing trailing comma - handled by formatter
    "ISC001", # Implicit string concatenation - conflicts with formatter
    "FBT001", # Boolean positional arg - sometimes needed
    "FBT002", # Boolean default value - often clearer
    "G004",   # Logging uses f-string - more readable
    "TRY003", # Avoid long messages outside exception class - sometimes needed
    "EM101",  # Exception string literals - simpler for small exceptions
    "EM102",  # Exception f-string literals - more readable
    "PLR0913", # Too many arguments - sometimes necessary
    "PLR0911", # Too many return statements - can be clearer
    "PLR2004", # Magic value comparison - sometimes clearer inline
    "PGH003", # Specific type ignore - sometimes needed
    "RET504", # Unnecessary variable before return - often clearer
    "SIM108", # Use ternary operator - not always clearer
    "C901",   # Too complex - will address case by case
    "PLR0912", # Too many branches - will address case by case
    "PLR0915", # Too many statements - will address case by case
    "PTH123", # open() without pathlib - sometimes cleaner
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

# Exclude common directories
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
    "build",
    "dist",
    "node_modules",
    "migrations",
    "temp",
    "backups",
    "logs",
    "data",
    ".serena",
    ".giljo-config",
]

# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = false

[lint.mccabe]
max-complexity = 15

[lint.isort]
known-first-party = ["giljo_mcp"]
force-single-line = false
force-sort-within-sections = false
lines-after-imports = 2

[lint.flake8-quotes]
inline-quotes = "double"

[lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",   # Assert allowed in tests
    "ARG",    # Unused arguments in fixtures OK
    "PLR2004", # Magic values OK in tests
    "S311",   # Random OK in tests
    "SLF001", # Private member access OK in tests
]
"examples/**/*.py" = [
    "T20",    # Print allowed in examples
    "INP001", # No __init__.py needed
]
"setup*.py" = [
    "T20",    # Print allowed in setup scripts
]
"monitor*.py" = [
    "T20",    # Print allowed in monitoring scripts
]
"**/conftest.py" = [
    "ARG",    # Unused arguments OK in pytest fixtures
]
# CLI tools with intentional print() statements for user output
"src/giljo_mcp/cleanup/visualizer.py" = ["T201"]  # CLI dependency visualization tool
"src/giljo_mcp/database_backup.py" = ["T201"]     # CLI database backup utility
"src/giljo_mcp/colored_logger.py" = ["T201"]      # Public API for colored console output
# Installation files - bypass all linting (transient code, user runs once)
"bootstrap.py" = ["ALL"]
"setup.py" = ["ALL"]
"setup_gui.py" = ["ALL"]
"installer/**/*.py" = ["ALL"]
"installers/**/*.py" = ["ALL"]

[lint.pylint]
max-args = 8
max-branches = 15
max-returns = 10
max-statements = 50

[lint.flake8-tidy-imports]
ban-relative-imports = "parents"
