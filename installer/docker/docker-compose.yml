version: '3.8'

# GiljoAI MCP Multi-Service Orchestration
# Base configuration for all environments

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: giljo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-giljo_mcp}
      POSTGRES_USER: ${POSTGRES_USER:-giljo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-giljo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - giljo_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: giljo_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy ${REDIS_POLICY:-allkeys-lru}
      --appendonly ${REDIS_AOF:-yes}
      --appendfsync ${REDIS_AOF_SYNC:-everysec}
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - giljo_network

  # GiljoAI MCP Application
  giljo_app:
    build:
      context: ../..
      dockerfile: installer/docker/Dockerfile.app
    image: giljo-mcp:${VERSION:-latest}
    container_name: giljo_app
    restart: unless-stopped
    environment:
      # Database configuration
      DATABASE_URL: postgresql://${POSTGRES_USER:-giljo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-giljo_mcp}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379/0
      
      # Application configuration
      GILJO_ENV: ${GILJO_ENV:-production}
      GILJO_SECRET_KEY: ${GILJO_SECRET_KEY}
      GILJO_API_KEY: ${GILJO_API_KEY}
      GILJO_LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # Network configuration
      GILJO_HOST: ${GILJO_HOST:-0.0.0.0}
      GILJO_PORT: ${GILJO_PORT:-8000}
      API_PORT: ${API_PORT:-8001}
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      
      # Feature flags
      ENABLE_MCP: ${ENABLE_MCP:-true}
      ENABLE_WEBSOCKET: ${ENABLE_WEBSOCKET:-true}
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
    volumes:
      - app_config:/app/config
      - app_data:/app/data
      - app_logs:/app/logs
      - ./config/.env:/app/.env:ro
    ports:
      - "${GILJO_PORT:-8000}:8000"
      - "${API_PORT:-8001}:8001"
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - giljo_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: giljo_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - giljo_app
    networks:
      - giljo_network
    profiles:
      - with-proxy

# Networks
networks:
  giljo_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# Volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_config:
    driver: local
  app_data:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local