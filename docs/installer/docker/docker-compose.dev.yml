version: "3.8"

# Development overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # PostgreSQL with exposed management port
  postgres:
    ports:
      - "5432:5432" # Expose for local development tools
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    volumes:
      - ./dev-data/postgres:/var/lib/postgresql/data # Local volume for easy access

  # Redis with exposed port and no password for dev
  redis:
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly no
    ports:
      - "6379:6379" # Expose for local development
    volumes:
      - ./dev-data/redis:/data # Local volume

  # Application with hot reload and debug mode
  giljo_app:
    build:
      context: ../..
      dockerfile: installer/docker/Dockerfile.app
      target: builder # Use builder stage for development
    image: giljo-mcp:dev
    environment:
      GILJO_ENV: development
      GILJO_DEBUG: "true"
      GILJO_LOG_LEVEL: debug
      GILJO_SECRET_KEY: dev_secret_key_not_for_production
      GILJO_API_KEY: dev_api_key_not_for_production
      DATABASE_URL: postgresql://giljo:dev_password@postgres:5432/giljo_mcp
      REDIS_URL: redis://redis:6379/0

      # Development features
      GILJO_DEBUG_TOOLBAR: "true"
      GILJO_PROFILING: "false"

      # CORS for local development
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000"
    volumes:
      # Mount source code for hot reload
      - ../../src:/app/src:ro
      - ../../api:/app/api:ro
      - ../../frontend:/app/frontend:ro
      - ../../tests:/app/tests:ro

      # Local data directories
      - ./dev-data/app:/app/data
      - ./dev-logs:/app/logs
      - ./dev-config:/app/config

      # Mount local .env file
      - ../../.env.dev:/app/.env:ro
    ports:
      - "8000:8000" # Main application
      - "8001:8001" # API
      - "3000:3000" # Frontend dev server
      - "5678:5678" # Python debugger port
      - "9229:9229" # Node.js debugger port
    command: >
      sh -c "
        echo 'Starting GiljoAI MCP in development mode...' &&
        pip install -e . &&
        python -m debugpy --listen 0.0.0.0:5678 --wait-for-client -m src.giljo_mcp.server
      "
    stdin_open: true
    tty: true

  # Development database admin tool
  adminer:
    image: adminer
    container_name: giljo_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    networks:
      - giljo_network
    profiles:
      - dev-tools

  # Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: giljo_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - giljo_network
    profiles:
      - dev-tools

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog
    container_name: giljo_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - giljo_network
    profiles:
      - dev-tools

# Override network configuration for development
networks:
  giljo_network:
    driver: bridge

# Use local directories for volumes in development
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dev-data/postgres

  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dev-data/redis

  app_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dev-data/app

  app_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./dev-logs
