version: "3.8"

# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # PostgreSQL with production settings
  postgres:
    image: postgres:15-alpine
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backup:/backup
    ports:
      - "127.0.0.1:5432:5432" # Only bind to localhost
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  # Redis with production settings
  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    command: >
      redis-server
      --requirepass-file /run/secrets/redis_password
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-backlog 511
      --tcp-keepalive 300
      --timeout 300
      --loglevel warning
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
      - redis_backup:/backup
    ports:
      - "127.0.0.1:6379:6379" # Only bind to localhost
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"

  # Application with production settings
  giljo_app:
    image: giljo-mcp:${VERSION:-latest}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "2"
          memory: 2G
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3
    environment:
      GILJO_ENV: production
      GILJO_DEBUG: "false"
      GILJO_LOG_LEVEL: warning
      DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_URL_FILE: /run/secrets/redis_url
      GILJO_SECRET_KEY_FILE: /run/secrets/app_secret_key
      GILJO_API_KEY_FILE: /run/secrets/api_key

      # Production optimizations
      PYTHONOPTIMIZE: 2
      PYTHONDONTWRITEBYTECODE: 1

      # Security headers
      SECURE_SSL_REDIRECT: "true"
      SESSION_COOKIE_SECURE: "true"
      CSRF_COOKIE_SECURE: "true"
      SECURE_HSTS_SECONDS: "31536000"
      SECURE_HSTS_INCLUDE_SUBDOMAINS: "true"
      SECURE_HSTS_PRELOAD: "true"
      SECURE_CONTENT_TYPE_NOSNIFF: "true"
      SECURE_BROWSER_XSS_FILTER: "true"
      X_FRAME_OPTIONS: "DENY"

      # Performance settings
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_MAX_REQUESTS: 1000
      GUNICORN_MAX_REQUESTS_JITTER: 50
      CONNECTION_POOL_SIZE: 20
      CONNECTION_MAX_OVERFLOW: 10
    secrets:
      - database_url
      - redis_url
      - app_secret_key
      - api_key
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - app_backup:/app/backup
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "20"
        labels: "service=giljo-app"

  # Nginx with SSL and production config
  nginx:
    image: nginx:alpine
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
      - ./ssl/certs:/etc/nginx/ssl/certs:ro
      - ./ssl/private:/etc/nginx/ssl/private:ro
      - ./ssl/dhparam.pem:/etc/nginx/ssl/dhparam.pem:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"
    profiles:
      - "" # Always run in production

  # Backup service
  backup:
    image: alpine:latest
    container_name: giljo_backup
    environment:
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      AWS_ACCESS_KEY_ID_FILE: /run/secrets/aws_access_key
      AWS_SECRET_ACCESS_KEY_FILE: /run/secrets/aws_secret_key
      S3_BUCKET: ${S3_BACKUP_BUCKET}
    secrets:
      - aws_access_key
      - aws_secret_key
    volumes:
      - postgres_backup:/backup/postgres
      - redis_backup:/backup/redis
      - app_backup:/backup/app
      - ./backup-scripts:/scripts:ro
    command: >
      sh -c "
        apk add --no-cache postgresql-client redis aws-cli &&
        crond -f -l 2
      "
    profiles:
      - with-backup

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: giljo_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - giljo_network
    profiles:
      - monitoring

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: giljo_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_password
      GF_INSTALL_PLUGINS: redis-datasource,postgres-datasource
    secrets:
      - grafana_password
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - giljo_network
    profiles:
      - monitoring

# Docker Secrets
secrets:
  postgres_password:
    external: true
  redis_password:
    external: true
  database_url:
    external: true
  redis_url:
    external: true
  app_secret_key:
    external: true
  api_key:
    external: true
  aws_access_key:
    external: true
  aws_secret_key:
    external: true
  grafana_password:
    external: true

# Production volumes with backup support
volumes:
  postgres_data:
    driver: local
  postgres_backup:
    driver: local
  redis_data:
    driver: local
  redis_backup:
    driver: local
  app_data:
    driver: local
  app_logs:
    driver: local
  app_backup:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
