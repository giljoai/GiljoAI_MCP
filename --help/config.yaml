database:
  database_type: sqlite
  path: ./data/giljo.db
server:
  mode: local
  host: localhost
  debug: false
  ports:
    mcp: 6001
    api: 6002
    frontend: 6000
tenant:
  enable_multi_tenant: false
  default_key: b8e602f89635159a447595cfd860bbe5c2bc7c5ffbb8d32d
app:
  name: GiljoAI MCP Orchestrator
  version: 1.0.0
  data_dir: ./data
  log_dir: ./logs
  config_dir: ./config
  vision_dir: ./docs/Vision
session:
  vision_chunk_size: 50000
  vision_overlap: 1000
  context_size: 100000
  timeout: 3600
mcp:
  stdio_mode: true
  transport: stdio
api:
  cors_origins:
  - http://localhost:6000
  - http://localhost:5500
  - http://127.0.0.1:6000
  rate_limit: 100
  require_api_key: false
websocket:
  heartbeat_interval: 30
  max_connections: 10
  queue_size: 1000
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: ./logs/giljo.log
  max_bytes: 10485760
  backup_count: 5
  console: true
agents:
  max_concurrent: 50
  timeout: 300
  default_capabilities:
  - code_analysis
  - code_generation
  - testing
  - documentation
  preconfigured:
  - name: assistant
    role: General coding assistant
    capabilities:
    - code
    - documentation
    - testing
  - name: analyzer
    role: Code analysis and review
    capabilities:
    - analysis
    - review
    - refactoring
  - name: builder
    role: Build and deployment
    capabilities:
    - build
    - deploy
    - configuration
templates:
  cache_enabled: true
  cache_ttl: 3600
  generation_target_ms: 0.1
security:
  jwt_secret_key: wQ2EOJk1kVN7769ivaTGgoXGO-_Qnb-ekTi9G_2t01k
  jwt_algorithm: HS256
  jwt_expiry: 86400
  min_password_length: 8
  require_special_chars: false
  secure_cookies: false
  session_cookie_name: giljo_session
performance:
  db_pool_size: 20
  db_pool_overflow: 10
  enable_cache: true
  cache_backend: memory
  max_request_size: 10485760
development:
  auto_reload: true
  debug_toolbar: false
  enable_profiling: false
