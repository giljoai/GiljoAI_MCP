extensions:
  - addsTo:
      pack: codeql/python-all
      extensible: summaryModel
    data:
      # log_sanitizer.sanitize() strips control characters from strings.
      # It is a taint barrier for log injection (CWE-117).
      - [
          "src.giljo_mcp.utils.log_sanitizer",
          "Member[sanitize]",
          "Argument[0]",
          "ReturnValue",
          "taint",
        ]
