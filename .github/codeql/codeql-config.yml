name: "GiljoAI CodeQL Config"
# Register custom sanitizer functions as taint barriers.
# Without this, CodeQL flags log calls using sanitize() as log-injection
# even though the function strips all control characters (CWE-117 fix).

extensions:
  - .github/codeql/extensions/log-sanitizer.model.yml

# Exclude quality rules that are either:
# - Already covered by ruff (which runs in CI with stricter config)
# - False positives for patterns used intentionally in this codebase
# Security rules remain fully active.
query-filters:
  # Broad except catches at API/WebSocket/resilience boundaries are intentional.
  # Every handler logs via logger.exception(). Ruff BLE001 already gates bare excepts.
  - exclude:
      id: py/empty-except

  # Alembic migration convention: revision, down_revision, branch_labels, depends_on
  # are required by the framework but never referenced in the migration file itself.
  - exclude:
      id: py/unused-global-variable

  # contextlib.suppress() fallback returns: the return after a with-suppress block
  # IS reachable (when the exception is suppressed), but CodeQL thinks it's dead code.
  - exclude:
      id: py/unreachable-statement

  # `await cancelled_task` inside `with suppress(CancelledError):` is effectful
  # (ensures task cleanup), but CodeQL sees it as a no-op expression statement.
  - exclude:
      id: py/ineffectual-statement

  # ExitStack.enter_context(open(...)) properly manages file lifecycle via atexit,
  # but CodeQL doesn't recognize ExitStack as a resource manager.
  - exclude:
      id: py/file-not-closed

  # Re-exports with # noqa: F401 are intentional API surface contracts.
  # Ruff F401 already catches genuinely unused imports.
  - exclude:
      id: py/unused-import
