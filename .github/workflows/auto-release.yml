name: Auto Release Sync

on:
  push:
    branches: [master]
    paths-ignore:
      - ".github/workflows/**"
      - "docs/**"
      - "tests/**"
      - "*.md"
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force full sync even without changes"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-to-release:
    name: Sync Master to Release Branch
    runs-on: ubuntu-latest

    # Only run on push or manual trigger
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}

    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup release branch
        run: |
          # Try to fetch the release branch from origin
          git fetch origin release-giljoai-mcp || true

          # Check if release branch exists locally
          if git show-ref --verify --quiet refs/heads/release-giljoai-mcp; then
            echo "Release branch exists locally"
            git checkout release-giljoai-mcp
          elif git show-ref --verify --quiet refs/remotes/origin/release-giljoai-mcp; then
            echo "Release branch exists on remote"
            git checkout -b release-giljoai-mcp origin/release-giljoai-mcp
          else
            echo "Creating new release branch"
            git checkout -b release-giljoai-mcp
          fi

      - name: Prepare release content
        run: |
          # Already on release branch from previous step

          # Get the latest master commit
          MASTER_COMMIT=$(git rev-parse master)

          # Reset to master but keep release branch pointer
          git reset --hard master

          # Remove files according to .release-ignore
          if [ -f .release-ignore ]; then
            echo "Removing development files according to .release-ignore..."

            # Process each pattern in .release-ignore
            while IFS= read -r pattern || [ -n "$pattern" ]; do
              # Skip comments and empty lines
              if [[ "$pattern" =~ ^[[:space:]]*#.*$ ]] || [[ -z "$pattern" ]] || [[ "$pattern" =~ ^[[:space:]]*$ ]]; then
                continue
              fi

              # Trim whitespace
              pattern=$(echo "$pattern" | xargs)

              echo "Processing pattern: $pattern"

              # Remove files matching pattern (use -path for full path patterns)
              if [[ "$pattern" == *"/"* ]]; then
                # Pattern contains directory separator, use -path
                find . -path "./$pattern" -type f -delete 2>/dev/null || true
                find . -path "./$pattern" -type d -exec rm -rf {} + 2>/dev/null || true
              else
                # Simple pattern, use -name
                find . -name "$pattern" -type f -delete 2>/dev/null || true
                find . -name "$pattern" -type d -exec rm -rf {} + 2>/dev/null || true
              fi

              # Also use git rm for tracked files
              git rm -rf --ignore-unmatch "$pattern" 2>/dev/null || true
            done < .release-ignore
          fi

          # Remove the .release-ignore file itself from release
          rm -f .release-ignore
          git rm -f --ignore-unmatch .release-ignore 2>/dev/null || true

          # Clean up empty directories
          find . -type d -empty -delete 2>/dev/null || true

          # Show what was removed
          echo "Files removed from release branch:"
          git status --porcelain | grep '^D ' | cut -d' ' -f2-

      - name: Commit release version
        run: |
          # Add all changes
          git add -A

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to release branch needed"
          else
            # Commit with reference to master commit
            MASTER_COMMIT_SHORT=$(git rev-parse --short master)
            git commit -m "Release sync from master@${MASTER_COMMIT_SHORT}

            Auto-generated production release excluding development files.
            Source: master@${MASTER_COMMIT_SHORT}"
          fi

      - name: Push to release branch
        run: |
          # Try to push with lease first (safer)
          if git push origin release-giljoai-mcp --force-with-lease; then
            echo "✅ Successfully synced master to release-giljoai-mcp branch (with lease)"
          else
            echo "⚠️ Force-with-lease failed, attempting regular push..."
            # Try without force first
            if git push origin release-giljoai-mcp; then
              echo "✅ Successfully synced master to release-giljoai-mcp branch"
            else
              echo "❌ Failed to push to release branch"
              echo "This might be due to branch protection rules or conflicts"
              exit 1
            fi
          fi

      - name: Create Release Summary
        run: |
          echo "## Release Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Branch**: master" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Branch**: release-giljoai-mcp" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: $(git rev-parse --short HEAD)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files Excluded from Release:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --name-only master release-giljoai-mcp | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
