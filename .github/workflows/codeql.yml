# Security scanning — GitHub CodeQL
# Runs weekly and on PRs to catch security vulnerabilities automatically
# What this does: GitHub's AI scans your Python and JavaScript for
# SQL injection, XSS, command injection, and other security bugs — for free
#
# Quality linting (empty-except, unused-vars, etc.) is handled by ruff in CI
# which runs stricter rules with project-specific configuration.

name: CodeQL Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          config: |
            query-filters:
              - exclude:
                  tags contain: maintainability
              - exclude:
                  tags contain: reliability

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
