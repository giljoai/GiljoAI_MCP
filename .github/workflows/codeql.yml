# Security scanning — GitHub CodeQL
# Runs weekly and on PRs to catch security vulnerabilities automatically
# What this does: GitHub's AI scans your Python and JavaScript for
# SQL injection, XSS, command injection, and other security bugs — for free

name: CodeQL Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          query-filters: |
            - exclude:
                tags contain: maintainability
            - exclude:
                tags contain: reliability
            - exclude:
                id: py/empty-except
            - exclude:
                id: py/file-not-closed
            - exclude:
                id: py/unused-global-variable
            - exclude:
                id: py/unused-local-variable
            - exclude:
                id: py/unreachable-statement
            - exclude:
                id: py/ineffectual-statement
            - exclude:
                id: py/unused-import
            - exclude:
                id: py/multiple-definition
            - exclude:
                id: py/redundant-comparison
            - exclude:
                id: py/import-and-import-from
            - exclude:
                id: py/implicit-string-concatenation-in-list
            - exclude:
                id: js/unused-local-variable
            - exclude:
                id: js/superfluous-trailing-arguments
          config-file: .github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
