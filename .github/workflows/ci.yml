# CI Pipeline — Python backend linting and tests
# Runs on every PR and push to master
# What this does: checks code quality (ruff) and runs the test suite (pytest)

name: Backend CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check . --output-format=github

      - name: Run ruff format check
        run: ruff format --check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: giljo_test
          POSTGRES_PASSWORD: giljo_test_pw
          POSTGRES_DB: giljo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://giljo_test:giljo_test_pw@localhost:5432/giljo_test
          GILJO_MODE: ""
          TESTING: "true"
        run: |
          pytest tests/unit/ -v --tb=short --timeout=30 \
            --ignore=tests/manual \
            --ignore=tests/saas \
            -m "not slow and not e2e and not stress and not network and not server_mode"
