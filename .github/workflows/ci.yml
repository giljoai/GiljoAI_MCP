# CI Pipeline — Python backend smoke checks
# Public repo: smoke gate only. Full lint + pytest run in private repo (primary CI gate).
# What this does: secret scan (gitleaks), AI signature check, installer integrity.
# Ruff and pytest are intentionally removed — they run in the private repo primary gate.
# INF-5017: slimmed 2026-04-29.

name: Backend CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks binary
        # Use the open-source binary directly (no GitHub Action wrapper).
        # gitleaks-action@v2 requires a paid license for org-owned repos,
        # the binary itself is MIT-licensed and free.
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks (working-tree scan)
        # --no-git scans only the current working tree (HEAD snapshot), not git
        # history. Pre-public-release historical findings are documented
        # baggage we accept; what we want to catch is new secrets entering the
        # current codebase. The pre-commit hook (.pre-commit-config.yaml) and
        # this CI job together ensure no new secret reaches master.
        run: gitleaks detect --redact --verbose --no-git --source . --no-banner

  no-ai-signatures:
    name: No AI signatures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for AI signatures in commit messages
        run: |
          # Check all commits in this PR (or push) for AI signatures
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMITS=$(git log --format="%H" origin/${{ github.base_ref }}..${{ github.sha }} 2>/dev/null || true)
          else
            COMMITS=$(git log --format="%H" -1)
          fi

          FAILED=false
          for sha in $COMMITS; do
            MSG=$(git log --format="%B" -1 "$sha")
            if echo "$MSG" | grep -qiE "Co-Authored-By:.*claude|Co-Authored-By:.*anthropic|Co-Authored-By:.*openai|Co-Authored-By:.*copilot|Co-Authored-By:.*cursor|Generated by|AI-generated"; then
              echo "::error::Commit $sha contains an AI signature. Remove Co-Authored-By or AI attribution lines."
              FAILED=true
            fi
          done

          if [ "$FAILED" = true ]; then
            echo ""
            echo "Policy: No AI signatures in commits (CLAUDE.md)"
            exit 1
          fi

      - name: Check for AI signatures in code
        run: |
          # Scan changed source files for AI branding
          # Exclude: docs, handovers, markdown, workflow files (contain detection patterns as literals)
          FILES=$(git diff --name-only HEAD~1 2>/dev/null | grep -vE '^(docs/|handovers/|\.github/|scripts/check_no_ai|ROADMAP|CHANGELOG)' | grep -vE '\.md$' || true)
          if [ -n "$FILES" ]; then
            PATTERN='Co-Authored-By:.*(claude|anthropic|openai|copilot|cursor)|Generated by (Claude|GPT|Copilot)'
            if echo "$FILES" | xargs grep -lriE "$PATTERN" 2>/dev/null; then
              echo "::error::AI signatures found in source files. Remove them."
              exit 1
            fi
          fi

  installer-integrity:
    name: Installer integrity (BOM, bat entry point, startup.py import order)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Static integrity checks
        # No third-party deps required: stdlib-only static checks.
        run: python scripts/check_installer_integrity.py

      - name: Venv-guard self-test (no-deps Python must reach --help)
        # Proves 'python startup.py --help' from a fresh shell does NOT
        # ModuleNotFoundError before the venv-relaunch guard runs. This is
        # the exact bug class that broke v1.1.9.2 installs.
        #
        # Setup: create a project-local ./venv/ (the guard looks here),
        # install click+colorama into it, then invoke startup.py with the
        # system Python that has ZERO project deps. The guard must re-exec
        # into ./venv/python and reach --help output.
        run: |
          python -m venv ./venv
          ./venv/bin/pip install --quiet click colorama
          # Sanity check: system Python has no click installed.
          python -c "import sys; sys.exit(0 if 'click' not in {m.split('.')[0] for m in sys.modules} else 1)"
          python -c "
          try:
              import click
              raise SystemExit('FAIL: system Python has click installed -- self-test invalid.')
          except ImportError:
              pass
          "
          # Now run startup.py --help with the no-deps system Python.
          # The guard must re-exec into ./venv/bin/python and succeed.
          python startup.py --help > /tmp/help.out 2>&1 || (echo '--- startup.py --help output ---'; cat /tmp/help.out; exit 1)
          grep -q "GiljoAI MCP" /tmp/help.out || (echo "Expected 'GiljoAI MCP' in --help output:"; cat /tmp/help.out; exit 1)
          echo "[OK] Venv-guard re-exec succeeded -- startup.py --help reachable from no-deps Python."

  installer-smoke-ubuntu:
    name: Installer smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Postgres 18
        shell: bash
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-18 postgresql-client-18
          sudo systemctl start postgresql
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          pg_isready -h localhost -p 5432
          psql --version

      - name: Run install.py --headless
        shell: bash
        env:
          PG_PASSWORD: postgres
        run: |
          python install.py --headless --pg-password "$PG_PASSWORD" || \
            (echo '--- install.py failed; dumping last 200 lines of installer.log ---'; \
             tail -n 200 installer.log 2>/dev/null || true; exit 1)

      - name: Verify startup.py --help (no ModuleNotFoundError)
        shell: bash
        run: |
          python startup.py --help > help.out 2>&1 || (cat help.out; exit 1)
          grep -q "GiljoAI MCP" help.out || (echo 'startup.py --help did not produce expected banner'; cat help.out; exit 1)

      - name: Verify alembic head applied
        shell: bash
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/giljo_mcp
        run: |
          source venv/bin/activate
          alembic current | tee alembic.out
          grep -qE '\(head\)' alembic.out || (echo 'Alembic not at head'; exit 1)

      - name: Verify frontend build
        shell: bash
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload installer log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: installer-log-ubuntu
          path: |
            installer.log
            help.out
            alembic.out
          if-no-files-found: ignore
