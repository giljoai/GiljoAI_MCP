# CI Pipeline — Frontend build and lint verification
# Public repo: smoke gate only (lint + build). Full vitest runs in private repo (primary CI gate).
# What this does: makes sure the Vue app compiles and ESLint passes.
# Unit tests (vitest) intentionally removed — they run in the private repo primary gate.
# INF-5017: slimmed 2026-04-29.

name: Frontend CI

on:
  push:
    branches: [master]
    paths:
      - "frontend/**"
  pull_request:
    branches: [master]
    paths:
      - "frontend/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build production bundle
        run: npm run build
