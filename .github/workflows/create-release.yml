name: Create Clean Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (format: 0.1.1)"
        required: true
        type: string
        default: "0.1.1"
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in format X.Y.Z (e.g., 0.1.1)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check CRITICAL_RELEASE-NOTES.MD
        run: |
          echo "⚠️ REMINDER: Review docs/CRITICAL_RELEASE-NOTES.MD before proceeding!" >> $GITHUB_STEP_SUMMARY
          if [ -f "docs/CRITICAL_RELEASE-NOTES.MD" ]; then
            echo "✅ CRITICAL_RELEASE-NOTES.MD found" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ WARNING: CRITICAL_RELEASE-NOTES.MD not found!" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Frontend (Production)
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..
          echo "✅ Frontend built successfully" >> $GITHUB_STEP_SUMMARY

      - name: Run Security Scans
        run: |
          # Install security tools
          pip install bandit
          npm install -g npm-audit-html

          # Python security scan
          echo "Running bandit security scan..."
          bandit -r src/ api/ installer/ -x tests || true

          # Frontend security audit
          echo "Running npm audit..."
          cd frontend
          npm audit --production || true
          cd ..

          echo "✅ Security scans completed" >> $GITHUB_STEP_SUMMARY

      - name: Run Tests
        run: |
          pip install -r requirements.txt
          pytest tests/ || echo "⚠️ Some tests failed" >> $GITHUB_STEP_SUMMARY

      - name: Create release tag
        run: |
          VERSION="v${{ github.event.inputs.version }}"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Generate release notes
        id: release_notes
        run: |
          cat << 'EOF' > release_notes.md
          # GiljoAI MCP Orchestrator - Release v${{ github.event.inputs.version }}

          ## 🚀 Installation

          ### Quick Start
          ```bash
          # Download and extract this release
          # Then run:
          python bootstrap.py
          ```

          ### Manual Installation
          ```bash
          # Clone specific release
          git clone --branch v${{ github.event.inputs.version }} https://github.com/${{ github.repository }}.git
          cd GiljoAI_MCP
          python bootstrap.py
          ```

          ## 📦 What's Included

          This release contains only production-ready files:
          - ✅ Core application (`src/`)
          - ✅ Installation system (`bootstrap.py`, `setup.py`, `installers/`)
          - ✅ User documentation (`docs/guides/`, `docs/manuals/`)
          - ✅ Configuration examples (`.env.example`, `config.yaml.example`)
          - ✅ Frontend dashboard (`frontend/dist/` - pre-built production bundle)
          - ✅ Security scanned and tested

          ## 🚫 What's Excluded

          Development files have been removed:
          - ❌ Test files and coverage reports
          - ❌ Development documentation (sessions, devlogs)
          - ❌ Debug and monitoring tools
          - ❌ Temporary and backup files
          - ❌ Vision and project management documents

          ## 📋 System Requirements

          - Python 3.8+
          - 4GB RAM minimum
          - Windows 10/11, macOS 10.15+, or Linux
          - PostgreSQL 14+ (optional, for server deployment)

          ## 🔧 Deployment Modes

          Choose during installation:
          - **Local Development**: PostgreSQL, no authentication, localhost only
          - **Server Deployment**: PostgreSQL/PostgreSQL, API key auth, network accessible

          ## 📖 Documentation

          - [Installation Guide](docs/INSTALL.md)
          - [User Guide](docs/guides/USER_GUIDE.md)
          - [API Reference](docs/guides/API_REFERENCE.md)
          - [Technical Architecture](docs/TECHNICAL_ARCHITECTURE.md)

          ## 🐛 Known Issues

          None in this release.

          ## 🔄 Upgrading

          From previous versions:
          1. Backup your `data/` directory
          2. Download new release
          3. Run `python setup_migration.py`

          ---
          *This is a clean release build with development artifacts removed.*
          EOF

      - name: Generate release archive
        run: |
          # The .gitattributes file will automatically exclude dev files
          git archive --format=tar.gz --prefix=GiljoAI_MCP-v${{ github.event.inputs.version }}/ \
            -o GiljoAI_MCP-v${{ github.event.inputs.version }}.tar.gz \
            HEAD

      - name: Generate release zip
        run: |
          git archive --format=zip --prefix=GiljoAI_MCP-v${{ github.event.inputs.version }}/ \
            -o GiljoAI_MCP-v${{ github.event.inputs.version }}.zip \
            HEAD

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            GiljoAI_MCP-v${{ github.event.inputs.version }}.tar.gz
            GiljoAI_MCP-v${{ github.event.inputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old release branch if exists
        run: |
          # Delete old release branch if it exists
          git push origin --delete release-giljoai-mcp 2>/dev/null || true

      - name: Summary
        run: |
          echo "## ✅ Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: v${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ github.event.inputs.prerelease && 'Pre-release' || 'Production Release' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: v${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Downloads" >> $GITHUB_STEP_SUMMARY
          echo "- [Release Page](https://github.com/${{ github.repository }}/releases/tag/v${{ github.event.inputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "- [tar.gz Archive](https://github.com/${{ github.repository }}/releases/download/v${{ github.event.inputs.version }}/GiljoAI_MCP-v${{ github.event.inputs.version }}.tar.gz)" >> $GITHUB_STEP_SUMMARY
          echo "- [zip Archive](https://github.com/${{ github.repository }}/releases/download/v${{ github.event.inputs.version }}/GiljoAI_MCP-v${{ github.event.inputs.version }}.zip)" >> $GITHUB_STEP_SUMMARY
