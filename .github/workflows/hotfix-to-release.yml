name: Sync Hotfix to Release

on:
  workflow_dispatch:
    inputs:
      files:
        description: "Files to sync (comma-separated, e.g., bootstrap.py,setup_gui.py)"
        required: true
        type: string
      commit_message:
        description: "Commit message for the hotfix"
        required: true
        type: string

jobs:
  sync-hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync files to release
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to release branch
          git checkout release-giljoai-mcp

          # Get the files from master
          IFS=',' read -ra FILES <<< "${{ github.event.inputs.files }}"
          for file in "${FILES[@]}"; do
            file=$(echo "$file" | xargs)  # trim whitespace
            echo "Syncing $file from master"
            git checkout master -- "$file"
          done

          # Commit and push
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "${{ github.event.inputs.commit_message }}"
            git push origin release-giljoai-mcp
            echo "✅ Files synced to release branch"
          else
            echo "ℹ️ No changes to sync"
          fi
