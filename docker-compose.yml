version: "3.9"

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: giljo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: giljo_mcp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d giljo_mcp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      giljo-net:
        ipv4_address: 172.20.0.2

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: ${BUILD_TARGET:-production}
    container_name: giljo-backend
    restart: unless-stopped
    ports:
      - "${GILJO_MCP_API_PORT:-6002}:6002"
      - "${GILJO_MCP_WEBSOCKET_PORT:-6003}:6003"
    environment:
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: giljo_mcp_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}

      # Server Configuration
      GILJO_MCP_MODE: ${GILJO_MCP_MODE:-local}
      GILJO_MCP_API_PORT: 6002
      GILJO_MCP_WEBSOCKET_PORT: 6003

      # Security
      GILJO_MCP_API_KEY: ${GILJO_MCP_API_KEY:-}
      GILJO_MCP_SECRET_KEY: ${GILJO_MCP_SECRET_KEY:-}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}

      # Feature Flags
      ENABLE_VISION_CHUNKING: ${ENABLE_VISION_CHUNKING:-true}
      ENABLE_MULTI_TENANT: ${ENABLE_MULTI_TENANT:-true}
      ENABLE_WEBSOCKET: ${ENABLE_WEBSOCKET:-true}

      # Agent Settings
      MAX_AGENTS_PER_PROJECT: ${MAX_AGENTS_PER_PROJECT:-20}
      AGENT_CONTEXT_LIMIT: ${AGENT_CONTEXT_LIMIT:-150000}
      AGENT_HANDOFF_THRESHOLD: ${AGENT_HANDOFF_THRESHOLD:-140000}

      # Session Settings
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-3600}
      MAX_CONCURRENT_SESSIONS: ${MAX_CONCURRENT_SESSIONS:-10}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./docs/vision:/app/docs/vision:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      giljo-net:
        ipv4_address: 172.20.0.3

  # Frontend Dashboard Service
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: ${BUILD_TARGET:-production}
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:6002}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:6003}
        VITE_APP_MODE: ${GILJO_MCP_MODE:-local}
    container_name: giljo-frontend
    restart: unless-stopped
    ports:
      - "${GILJO_MCP_DASHBOARD_PORT:-6000}:80"
    environment:
      # Runtime environment (for development mode)
      VITE_API_URL: ${VITE_API_URL:-http://localhost:6002}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:6003}
      VITE_APP_MODE: ${GILJO_MCP_MODE:-local}
    depends_on:
      - backend
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      giljo-net:
        ipv4_address: 172.20.0.4

# Networks
networks:
  giljo-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

# Volumes
volumes:
  postgres_data:
    driver: local
    name: giljo_postgres_data
