[tool.ruff]
# Ignore specific rules that are too strict for this project
ignore = [
    "E402",    # Module import not at top of file (needed for path manipulation)
    "TRY300",  # Consider moving to else block (style preference)
    "TRY401",  # Redundant exception in logging (false positives)
    "ARG001",  # Unused function argument (often needed for interfaces)
    "ARG002",  # Unused method argument (often needed for interfaces)
    "S104",    # Possible binding to all interfaces (intentional for servers)
    "PLC0415", # Import should be at top-level (sometimes needed conditionally)
    "PLW0603", # Using global statement (needed for singletons)
    "RUF012",  # Mutable class attributes (false positives)
    "BLE001",  # Blind exception catch (sometimes necessary)
    "PERF203", # Try-except in loop (sometimes necessary)
    "PERF401", # Use list comprehension (readability preference)
    "G201",    # Logging exception (style preference)
    "B904",    # Raise from (not always needed)
    "S110",    # Try-except-pass (sometimes intentional)
    "S324",    # MD5 hash (used for non-cryptographic purposes)
    "SIM102",  # Nested if (readability preference)
    "E722",    # Bare except (sometimes necessary)
]

# Set reasonable line length
line-length = 120

# Target Python 3.10+
target-version = "py310"

# Exclude common directories
exclude = [
    ".git",
    "__pycache__",
    "venv",
    "env",
    ".venv",
    "build",
    "dist",
    "node_modules",
    ".eggs",
    "*.egg-info",
    "htmlcov",
    ".coverage",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
]
