# Pre-commit hooks for GiljoAI MCP (public CE).
#
# Install once:
#   pip install pre-commit
#   pre-commit install
#
# Run manually on all files:
#   pre-commit run --all-files
#
# These hooks mirror the public CI gates. Running them locally catches
# issues before they reach CI.

repos:
  # Built-in hygiene + private-key detection
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
        # Catches accidental staging of SSH/TLS private keys regardless of filename.
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Content-based secret scanning. Catches API tokens, AWS keys, JWTs,
  # private keys, and many other credential patterns.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
