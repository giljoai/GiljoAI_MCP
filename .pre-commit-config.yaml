# Pre-commit hooks for GiljoAI MCP Coding Orchestrator
# See https://pre-commit.com for more information
#
# Install: pip install pre-commit && pre-commit install
# Update hooks: pre-commit autoupdate
#
# RE-ENABLED after 0700 cleanup series (2026-02-07)
#
# ============================================================================
# CRITICAL: AI AGENT INSTRUCTIONS (Claude Code, etc.)
# ============================================================================
#
# When pre-commit hooks BLOCK a commit:
#
#   1. DO NOT use --no-verify to bypass hooks
#   2. DO NOT disable hooks in this config file
#   3. ASK THE USER: "Pre-commit hooks are blocking this commit due to:
#      [list issues]. How would you like to proceed?"
#   4. Present options:
#      - Fix the issues (recommended)
#      - User explicitly approves bypass (document reason in commit message)
#      - Defer commit until issues resolved
#
# Bypassing without user approval leads to technical debt accumulation.
# The 21K lint issues in this codebase came from repeated bypasses.
#
# ============================================================================

default_language_version:
  python: python3

repos:
  # Python linting and formatting - RE-ENABLED after 0707-LINT cleanup
  # Excludes: tests (lint in CI), installer scripts (use print), dev tools
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        name: ruff (linter)
        exclude: ^(tests/|Linux_Installer/|installers/|install\.py|uninstall\.py|startup\.py|scripts/|dev_tools/|monitor.*\.py|fix_.*\.py)
      - id: ruff-format
        name: ruff (formatter)
        exclude: ^(tests/|Linux_Installer/|installers/|install\.py|uninstall\.py|startup\.py|scripts/|dev_tools/|monitor.*\.py|fix_.*\.py)

  # Note: black removed - ruff-format handles formatting
  # Note: mypy deferred to post-v1.0 (0708-TYPES modernized syntax, mypy strictness is future work)

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(.*\.(md|rst)|tests/fixtures/)
        args: ["--markdown-linebreak-ext=md,markdown"]
      - id: end-of-file-fixer
        exclude: ^(tests/fixtures/|.*\.min\.js)
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-docstring-first
      # - id: check-executables-have-shebangs  # TEMPORARILY DISABLED - too many permission issues
      # - id: check-shebang-scripts-are-executable  # TEMPORARILY DISABLED - permission sync issues
      - id: debug-statements
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
      # - id: name-tests-test  # TEMPORARILY DISABLED - some test utilities don't follow naming convention
      #   args: ["--pytest-test-first"]
      #   exclude: ^(tests/helpers/|tests/fixtures/)
      - id: requirements-txt-fixer

  # Security checks - RE-ENABLED after 0709-SECURITY cleanup (blocks on issues)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: bandit (security scan)
        args: ["-c", "pyproject.toml", "-r", "src/", "api/", "-ll"] # Medium+ severity
        exclude: ^(tests/|examples/|installer/|installers/|scripts/|uninstall\.py|monitor.*\.py)
        pass_filenames: false

  # Secret scanning - catches API keys, passwords in code
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)

  # Dependency vulnerability scanning - Python (warning mode, doesn't block)
  # TODO: Upgrade mcp 1.12.3 → 1.23.0 to fix GHSA-9h52-p55h-vw2f
  # Run manually before releases: pip-audit -r requirements.txt
  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        name: pip-audit (Python vulnerabilities)
        args: ["-r", "requirements.txt", "--skip-editable"]
        verbose: true
        stages: [manual] # Only runs with: pre-commit run pip-audit

  # TEMPORARILY DISABLED - bash not found on Windows, causing failures
  # - repo: local
  #   hooks:
  #     - id: eslint
  #       name: ESLint
  #       entry: bash -c 'cd frontend && npm run lint'
  #       language: system
  #       files: \.(js|jsx|ts|tsx|vue)$
  #       pass_filenames: false
  #
  #     - id: prettier
  #       name: Prettier
  #       entry: bash -c 'cd frontend && npm run format'
  #       language: system
  #       files: \.(js|jsx|ts|tsx|vue|json|css|scss|md)$
  #       pass_filenames: false

  # TEMPORARILY DISABLED - too many spelling errors to fix right now
  # - repo: https://github.com/codespell-project/codespell
  #   rev: v2.3.0
  #   hooks:
  #     - id: codespell
  #       args: ["--ignore-words-list", "giljo,mcp,orchestrator,nd,ans"]
  #       exclude: ^(node_modules/|.*\.min\..*|package-lock\.json)

  # YAML formatting (markdown disabled to avoid double-commit issues)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [yaml] # Removed markdown - not needed for docs
        exclude: ^(frontend/|node_modules/)

  # Deprecated model detection (Handover 0358d)
  - repo: local
    hooks:
      - id: no-deprecated-models
        name: Check for deprecated model usage
        entry: python scripts/check_deprecated_models.py
        language: system
        files: \.py$
        exclude: ^(tests/|migrations/|handovers/)
        pass_filenames: true

  # CE/SaaS import boundary enforcement
  # Prevents Community Edition code from importing SaaS-only modules
  - repo: local
    hooks:
      - id: saas-import-boundary
        name: CE/SaaS import boundary check
        entry: python scripts/check_saas_import_boundary.py
        language: system
        files: \.(py|js|ts|vue|jsx|tsx)$
        exclude: ^(.*saas/.*|.*__pycache__/.*|handovers/|.*\.md$)
        pass_filenames: true

  # ESLint warning budget - freezes warning count at current level (0760-perfect-score)
  # Run manually: pre-commit run eslint-warning-budget --all-files
  - repo: local
    hooks:
      - id: eslint-warning-budget
        name: ESLint warning budget
        entry: bash -c 'cd frontend && npx eslint src/ --max-warnings=8'
        language: system
        files: ^frontend/src/.*\.(js|vue)$
        pass_filenames: false
        stages: [manual]

# Configuration for specific file types
files: |
  (?x)^(
    .*\.py|
    .*\.yaml|
    .*\.yml|
    .*\.json|
    .*\.js|
    .*\.jsx|
    .*\.ts|
    .*\.tsx|
    .*\.vue|
    .*\.toml|
    .*\.ini
  )$

exclude: |
  (?x)^(
    .*migrations/.*|
    .*node_modules/.*|
    .*\.git/.*|
    .*\.venv/.*|
    .*__pycache__/.*|
    .*\.mypy_cache/.*|
    .*\.pytest_cache/.*|
    .*\.ruff_cache/.*|
    .*build/.*|
    .*dist/.*|
    .*\.egg-info/.*|
    .*data/.*|
    .*logs/.*|
    .*backups/.*|
    .*temp/.*|
    .*\.serena/.*|
    .*\.giljo-config/.*
  )$
