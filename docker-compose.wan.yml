version: "3.9"

# GiljoAI MCP - WAN Production Deployment
# This configuration provides a complete WAN stack with:
# - nginx reverse proxy with SSL
# - FastAPI backend with Gunicorn
# - PostgreSQL with SSL
# - Redis Sentinel cluster
# - Prometheus + Grafana monitoring
# - Loki + Promtail logging

# Usage:
#   docker-compose -f docker-compose.wan.yml up -d
#   docker-compose -f docker-compose.wan.yml --profile monitoring up -d  # With monitoring

networks:
  giljo-frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  giljo-backend:
    driver: bridge
    internal: true # No internet access for backend network
    ipam:
      config:
        - subnet: 172.20.1.0/24

volumes:
  postgres_data:
    driver: local
    name: giljo_postgres_data
  postgres_backups:
    driver: local
    name: giljo_postgres_backups
  redis_data:
    driver: local
    name: giljo_redis_data
  nginx_cache:
    driver: local
    name: giljo_nginx_cache
  nginx_certs:
    driver: local
    name: giljo_nginx_certs
  prometheus_data:
    driver: local
    name: giljo_prometheus_data
  grafana_data:
    driver: local
    name: giljo_grafana_data
  loki_data:
    driver: local
    name: giljo_loki_data

services:
  # PostgreSQL Primary Database (with SSL)
  postgres:
    image: postgres:18-alpine
    container_name: giljo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-giljo_mcp}
      POSTGRES_USER: ${DB_USER:-giljo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      # SSL configuration
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/postgres/ssl:/var/lib/postgresql/ssl:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      giljo-backend:
        ipv4_address: 172.20.1.10
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-giljo_user} -d ${DB_NAME:-giljo_mcp}",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=postgres,env=production"

  # Redis Master (Sentinel mode)
  redis-master:
    image: redis:7-alpine
    container_name: giljo-redis-master
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfilename "appendonly.aof"
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 300
    volumes:
      - redis_data:/data
    networks:
      giljo-backend:
        ipv4_address: 172.20.1.20
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Redis Sentinel (3 instances for quorum)
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: giljo-redis-sentinel-1
    restart: unless-stopped
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./docker/redis/sentinel.conf:/etc/redis/sentinel.conf
    networks:
      - giljo-backend
    depends_on:
      - redis-master
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  redis-sentinel-2:
    image: redis:7-alpine
    container_name: giljo-redis-sentinel-2
    restart: unless-stopped
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./docker/redis/sentinel.conf:/etc/redis/sentinel.conf
    networks:
      - giljo-backend
    depends_on:
      - redis-master
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  redis-sentinel-3:
    image: redis:7-alpine
    container_name: giljo-redis-sentinel-3
    restart: unless-stopped
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./docker/redis/sentinel.conf:/etc/redis/sentinel.conf
    networks:
      - giljo-backend
    depends_on:
      - redis-master
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # GiljoAI MCP API Backend (Production with Gunicorn)
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
      args:
        INSTALL_DEV_DEPS: "false"
    container_name: giljo-backend
    restart: unless-stopped
    environment:
      # Application
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"

      # Security
      GILJO_MCP_MODE: wan
      GILJO_MCP_SECRET_KEY: ${SECRET_KEY}
      GILJO_MCP_API_KEY: ${API_KEY}

      # Database
      DB_TYPE: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-giljo_mcp}
      DB_USER: ${DB_USER:-giljo_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL_MODE: require

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-master:6379/0
      REDIS_SENTINEL_ENABLED: "true"
      REDIS_SENTINEL_HOSTS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379

      # Performance
      WORKERS: ${WORKERS:-4}
      WORKER_CONNECTIONS: ${WORKER_CONNECTIONS:-1000}
      KEEPALIVE: ${KEEPALIVE:-5}
      MAX_REQUESTS: ${MAX_REQUESTS:-1000}
      MAX_REQUESTS_JITTER: ${MAX_REQUESTS_JITTER:-50}
      TIMEOUT: ${TIMEOUT:-30}

      # Features
      ENABLE_SWAGGER: "false"
      ENABLE_DEBUG_ENDPOINTS: "false"
      ENABLE_PROFILING: "false"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./docs/vision:/app/docs/vision:ro
      - ./config.yaml:/app/config.yaml:ro
    networks:
      giljo-backend:
        ipv4_address: 172.20.1.30
      giljo-frontend:
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting Gunicorn production server...' &&
        gunicorn api.app:app \
          --bind 0.0.0.0:7272 \
          --workers ${WORKERS:-4} \
          --worker-class uvicorn.workers.UvicornWorker \
          --worker-connections ${WORKER_CONNECTIONS:-1000} \
          --max-requests ${MAX_REQUESTS:-1000} \
          --max-requests-jitter ${MAX_REQUESTS_JITTER:-50} \
          --timeout ${TIMEOUT:-30} \
          --keepalive ${KEEPALIVE:-5} \
          --access-logfile /app/logs/access.log \
          --error-logfile /app/logs/error.log \
          --log-level ${LOG_LEVEL:-info} \
          --preload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7272/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
        reservations:
          cpus: "2.0"
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "20"
        labels: "service=backend,env=production"

  # Frontend (Vue 3 - Production Build)
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: production
      args:
        NODE_ENV: production
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-/ws}
        VITE_APP_MODE: wan
    container_name: giljo-frontend
    restart: unless-stopped
    volumes:
      - nginx_cache:/var/cache/nginx
    networks:
      - giljo-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # nginx Reverse Proxy (SSL Termination & Load Balancing)
  nginx:
    image: nginx:alpine
    container_name: giljo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/wan/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/ssl:ro
      - ./docker/nginx/dhparam.pem:/etc/ssl/certs/dhparam.pem:ro
      - nginx_certs:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
      - ./logs/nginx:/var/log/nginx
    networks:
      - giljo-frontend
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=nginx,env=production"

  # Certbot for Let's Encrypt SSL Certificates
  certbot:
    image: certbot/certbot:latest
    container_name: giljo-certbot
    volumes:
      - nginx_certs:/etc/letsencrypt
      - ./docker/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - giljo-frontend
    profiles:
      - certbot # Only run when explicitly requested
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: giljo-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - giljo-frontend
      - giljo-backend
    depends_on:
      - backend
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Grafana (Metrics Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: giljo-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://${DOMAIN:-yourdomain.com}/grafana
      GF_INSTALL_PLUGINS: ${GRAFANA_PLUGINS:-}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - giljo-frontend
    depends_on:
      - prometheus
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Loki (Log Aggregation)
  loki:
    image: grafana/loki:latest
    container_name: giljo-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - giljo-frontend
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Promtail (Log Shipper)
  promtail:
    image: grafana/promtail:latest
    container_name: giljo-promtail
    restart: unless-stopped
    volumes:
      - ./docker/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/giljo:ro
      - /var/log:/var/log/host:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - giljo-frontend
    depends_on:
      - loki
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Node Exporter (System Metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: giljo-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - giljo-frontend
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Postgres Exporter (Database Metrics)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: giljo-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-giljo_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-giljo_mcp}?sslmode=require"
    networks:
      - giljo-backend
      - giljo-frontend
    depends_on:
      - postgres
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Exporter (Cache Metrics)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: giljo-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis-master:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - giljo-backend
      - giljo-frontend
    depends_on:
      - redis-master
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backup Service (Automated PostgreSQL Backups)
  backup:
    image: postgres:18-alpine
    container_name: giljo-backup
    restart: "no"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${DB_NAME:-giljo_mcp}
      PGUSER: ${DB_USER:-giljo_user}
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_backups:/backups
      - ./scripts/deployment/backup_wan.sh:/backup.sh:ro
    command: /backup.sh
    networks:
      - giljo-backend
    depends_on:
      - postgres
    profiles:
      - backup # Run manually or via cron
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
