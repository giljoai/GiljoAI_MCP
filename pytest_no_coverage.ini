[pytest]
# Simplified pytest config without coverage for quick testing
minversion = 7.0
addopts = -ra --strict-markers --asyncio-mode=auto
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    e2e: marks tests as end-to-end tests
    stress: marks tests as stress/performance tests
    network: marks tests requiring network connectivity
    server_mode: marks tests requiring server mode
    security: marks tests as security-related tests
