<svg width="680" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Roboto', 'Segoe UI', system-ui, sans-serif;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- ============================================
     SERVER CONTAINER
     ============================================ -->
<rect x="30" y="16" width="620" height="158" rx="12" fill="#182739" stroke="#315074" stroke-width="1"/>
<text x="340" y="42" text-anchor="middle" fill="#ffc300" font-size="15" font-weight="700">GiljoAI MCP server</text>

<!-- Context store -->
<rect x="50" y="58" width="180" height="96" rx="8" fill="#1e3147" stroke="#315074" stroke-width="0.5"/>
<text x="140" y="86" text-anchor="middle" fill="#e1e1e1" font-size="13" font-weight="600">Context store</text>
<text x="140" y="106" text-anchor="middle" fill="#8f97b7" font-size="11">Products, projects,</text>
<text x="140" y="121" text-anchor="middle" fill="#8f97b7" font-size="11">vision docs, tasks</text>

<!-- Orchestration -->
<rect x="250" y="58" width="180" height="96" rx="8" fill="#1e3147" stroke="#315074" stroke-width="0.5"/>
<text x="340" y="86" text-anchor="middle" fill="#e1e1e1" font-size="13" font-weight="600">Orchestration</text>
<text x="340" y="106" text-anchor="middle" fill="#8f97b7" font-size="11">Missions, jobs,</text>
<text x="340" y="121" text-anchor="middle" fill="#8f97b7" font-size="11">agent coordination</text>

<!-- MCP host -->
<rect x="450" y="58" width="180" height="96" rx="8" fill="#1e3147" stroke="#315074" stroke-width="0.5"/>
<text x="540" y="86" text-anchor="middle" fill="#e1e1e1" font-size="13" font-weight="600">MCP host</text>
<text x="540" y="106" text-anchor="middle" fill="#8f97b7" font-size="11">Slash commands,</text>
<text x="540" y="121" text-anchor="middle" fill="#8f97b7" font-size="11">prompts, templates</text>

<!-- ============================================
     COMMUNICATION CHANNELS
     ============================================ -->

<!-- Web UI channel (left) -->
<line x1="140" y1="174" x2="140" y2="296" stroke="#ffc300" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<rect x="80" y="216" width="120" height="24" rx="6" fill="#0e1c2d" stroke="#ffc300" stroke-width="0.5"/>
<text x="140" y="232" text-anchor="middle" fill="#ffc300" font-size="11" font-weight="500">Web UI</text>

<!-- MCP Protocol channel (right) -->
<line x1="470" y1="174" x2="470" y2="296" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<rect x="400" y="216" width="140" height="24" rx="6" fill="#0e1c2d" stroke="#8b5cf6" stroke-width="0.5"/>
<text x="470" y="232" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="500">MCP protocol</text>

<!-- ============================================
     CLIENT CONTAINER
     ============================================ -->
<rect x="30" y="296" width="620" height="208" rx="12" fill="#182739" stroke="#315074" stroke-width="1"/>
<text x="340" y="322" text-anchor="middle" fill="#8f97b7" font-size="13" font-weight="500">Your machine</text>

<!-- Browser -->
<rect x="60" y="340" width="160" height="56" rx="8" fill="#1e3147" stroke="#ffc300" stroke-width="0.5"/>
<text x="140" y="364" text-anchor="middle" fill="#e1e1e1" font-size="13" font-weight="600">Browser</text>
<text x="140" y="381" text-anchor="middle" fill="#8f97b7" font-size="11">Dashboard &amp; config</text>

<!-- Terminal Agent 1 -->
<rect x="310" y="340" width="90" height="56" rx="8" fill="#1e3147" stroke="#8b5cf6" stroke-width="0.5"/>
<text x="355" y="364" text-anchor="middle" fill="#e1e1e1" font-size="12" font-weight="600">Agent 1</text>
<text x="355" y="381" text-anchor="middle" fill="#8f97b7" font-size="10">Terminal</text>

<!-- Terminal Agent 2 -->
<rect x="412" y="340" width="90" height="56" rx="8" fill="#1e3147" stroke="#8b5cf6" stroke-width="0.5"/>
<text x="457" y="364" text-anchor="middle" fill="#e1e1e1" font-size="12" font-weight="600">Agent 2</text>
<text x="457" y="381" text-anchor="middle" fill="#8f97b7" font-size="10">Terminal</text>

<!-- Terminal Agent 3 -->
<rect x="514" y="340" width="90" height="56" rx="8" fill="#1e3147" stroke="#8b5cf6" stroke-width="0.5"/>
<text x="559" y="364" text-anchor="middle" fill="#e1e1e1" font-size="12" font-weight="600">Agent 3</text>
<text x="559" y="381" text-anchor="middle" fill="#8f97b7" font-size="10">Terminal</text>

<!-- Project files -->
<rect x="300" y="416" width="310" height="44" rx="8" fill="#1e3147" stroke="#67bd6d" stroke-width="0.5"/>
<text x="455" y="443" text-anchor="middle" fill="#67bd6d" font-size="13" font-weight="600">Project files / repo</text>

<!-- Arrows: agents to project files -->
<line x1="355" y1="396" x2="355" y2="414" stroke="#8f97b7" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="457" y1="396" x2="457" y2="414" stroke="#8f97b7" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="559" y1="396" x2="559" y2="414" stroke="#8f97b7" stroke-width="1" marker-end="url(#arrow)"/>

<!-- User icon -->
<circle cx="140" cy="435" r="10" fill="none" stroke="#ffc300" stroke-width="1.2"/>
<circle cx="140" cy="432" r="4" fill="none" stroke="#ffc300" stroke-width="1"/>
<path d="M126 455 Q140 445 154 455" fill="none" stroke="#ffc300" stroke-width="1.2" stroke-linecap="round"/>
<text x="140" y="472" text-anchor="middle" fill="#ffc300" font-size="12" font-weight="500">You</text>

<!-- Arrow: user to browser -->
<line x1="140" y1="420" x2="140" y2="398" stroke="#ffc300" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ============================================
     LEGEND
     ============================================ -->
<circle cx="60" cy="500" r="4" fill="#ffc300"/>
<text x="72" y="504" fill="#8f97b7" font-size="10">Web UI (browser)</text>
<circle cx="220" y="500" r="4" fill="#8b5cf6"/>
<text x="232" y="504" fill="#8f97b7" font-size="10">MCP protocol (terminals)</text>
<circle cx="420" y="500" r="4" fill="#67bd6d"/>
<text x="432" y="504" fill="#8f97b7" font-size="10">Local files</text>

</svg>
