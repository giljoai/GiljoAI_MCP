<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Giljo Mascot - Loader V2</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: transparent !important;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .loader-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent !important;
    }
    #mascot-container {
      /* Size will be set by JavaScript */
      background: transparent !important;
    }
    svg {
      width: 100%;
      height: 100%;
      background: transparent !important;
    }
    .eye-dot {
      transition: none;
    }
    
    /* Pulsing dots animation */
    .loading-dots {
      margin-top: 2px; /* Reduced by 50% from 5px */
      font-family: monospace;
      letter-spacing: 0.3em;
      text-align: center;
      color: #ffc300;
    }
    
    /* Blue dots for light backgrounds */
    .blue-dots .loading-dots {
      color: #0e1c2d;
    }
    
    .dot {
      animation: pulse 1.5s infinite;
      display: inline-block;
    }
    
    .dot:nth-child(1) {
      animation-delay: 0s;
    }
    
    .dot:nth-child(2) {
      animation-delay: 0.3s;
    }
    
    .dot:nth-child(3) {
      animation-delay: 0.6s;
    }
    
    @keyframes pulse {
      0%, 60%, 100% {
        opacity: 0.3;
        transform: scale(0.8);
      }
      30% {
        opacity: 1;
        transform: scale(1.2);
      }
    }
    
    /* Dark eyes for light backgrounds */
    .dark-eyes .st1 {
      fill: #080d13 !important;
    }
  </style>
</head>
<body>
  <div class="loader-wrapper">
    <div id="mascot-container">
      <svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            .st0 { fill: transparent; }
            .st1 { fill: #e1e1e1; }
            .st2 { fill: none; }
            .st3 { fill: #ffc300; }
          </style>
        </defs>
        
        <!-- Background (removed for transparency) -->
        <!-- <g id="Layer_2">
          <rect class="st0" width="250" height="250"/>
        </g> -->
        
        <g id="Layer_1">
          <path class="st3" d="M226.87,73.06c-2.29-7.5-5.95-14.44-10.99-20.83-5.04-6.39-11.66-11.69-19.86-15.91-8.2-4.22-18.17-6.33-29.88-6.33h-82.44c-6.33,0-13.24,1.12-20.74,3.34-7.5,2.23-14.44,5.89-20.83,10.99-6.39,5.1-11.72,11.72-16,19.86-4.28,8.15-6.42,18.08-6.42,29.79v61.88c0,11.84,2.14,21.83,6.42,29.97,4.28,8.15,9.61,14.77,16,19.86,6.39,5.1,13.33,8.76,20.83,10.99,7.5,2.23,14.41,3.34,20.74,3.34h82.44c4.33,0,8.93-.5,13.8-1.49,4.86-.99,9.67-2.55,14.41-4.66s9.29-4.83,13.62-8.17c4.33-3.34,8.14-7.38,11.43-12.13,3.28-4.75,5.92-10.25,7.91-16.52,1.99-6.27,2.99-13.33,2.99-21.18v-61.88c0-6.44-1.14-13.42-3.43-20.92ZM184.59,155.85c0,5.98-1.52,10.55-4.57,13.71-3.05,3.16-7.68,4.75-13.89,4.75h-82.09c-6.09,0-10.72-1.58-13.89-4.75s-4.75-7.73-4.75-13.71v-61.88c0-5.98,1.58-10.52,4.75-13.62,3.16-3.1,7.79-4.66,13.89-4.66h82.09c5.98,0,10.55,1.52,13.71,4.57,3.16,3.05,4.75,7.73,4.75,14.06v61.52Z"/>
          
          <path class="st2" d="M166.13,75.69h-82.09c-6.09,0-10.72,1.55-13.89,4.66-3.16,3.11-4.75,7.65-4.75,13.62v61.88c0,5.98,1.58,10.55,4.75,13.71s7.79,4.75,13.89,4.75h82.09c6.21,0,10.84-1.58,13.89-4.75,3.05-3.16,4.57-7.73,4.57-13.71v-61.52c0-6.33-1.58-11.01-4.75-14.06-3.16-3.05-7.73-4.57-13.71-4.57Z"/>
          
          <g id="eyes-open">
            <circle class="st1 eye-dot" id="left-eye" cx="93.87" cy="148.51" r="19.5"/>
            <circle class="st1 eye-dot" id="right-eye" cx="138.37" cy="148.51" r="19.5"/>
          </g>
          
          <g id="eyes-closed" style="display: none;">
            <rect class="st1" x="74.37" y="145.81" width="39" height="5.4"/>
            <rect class="st1" x="118.87" y="145.81" width="39" height="5.4"/>
          </g>
        </g>
      </svg>
    </div>
    
    <div class="loading-dots">
      <span class="dot">•</span><span class="dot">•</span><span class="dot">•</span>
    </div>
  </div>

  <script>
    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const size = parseInt(urlParams.get('size')) || 150;
    const darkEyes = urlParams.get('darkEyes') === 'true';
    
    // Set size
    const container = document.getElementById('mascot-container');
    container.style.width = size + 'px';
    container.style.height = size + 'px';
    
    // Set dot size proportionally
    const dots = document.querySelector('.loading-dots');
    dots.style.fontSize = (size / 6) + 'px';
    
    // Dark eyes for light backgrounds
    if (darkEyes) {
      document.body.classList.add('dark-eyes');
      document.body.classList.add('blue-dots');
    }
    
    let currentPhase = 0;
    
    function performBlink() {
      const open = document.getElementById("eyes-open");
      const closed = document.getElementById("eyes-closed");
      
      open.style.display = "none";
      closed.style.display = "inline";
      
      setTimeout(() => {
        open.style.display = "inline";
        closed.style.display = "none";
      }, 300);
    }
    
    function moveEyesToPosition(position) {
      const leftEye = document.getElementById("left-eye");
      const rightEye = document.getElementById("right-eye");
      
      switch(position) {
        case 'center':
          leftEye.style.transform = "translate(0, 0)";
          rightEye.style.transform = "translate(0, 0)";
          break;
        case 'upper-right':
          leftEye.style.transform = "translate(12px, -40px)";
          rightEye.style.transform = "translate(12px, -40px)";
          break;
        case 'upper-left':
          leftEye.style.transform = "translate(0, -40px)";
          rightEye.style.transform = "translate(0, -40px)";
          break;
      }
    }
    
    function runLoadingCycle() {
      switch(currentPhase) {
        case 0: moveEyesToPosition('center'); break;
        case 1: moveEyesToPosition('upper-right'); break;
        case 2: moveEyesToPosition('upper-left'); break;
        case 3: moveEyesToPosition('upper-right'); break;
        case 4: moveEyesToPosition('center'); break;
        case 5: performBlink(); break;
        case 6: break; // Pause
        case 7: performBlink(); break;
      }
      
      currentPhase = (currentPhase + 1) % 8;
    }
    
    setInterval(runLoadingCycle, 600);
    runLoadingCycle();
  </script>
</body>
</html>
