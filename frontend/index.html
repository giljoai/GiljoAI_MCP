<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GiljoAI MCP - Multi-agent orchestration dashboard">
    <meta name="theme-color" content="#0e1c2d">
    <title>GiljoAI MCP</title>
    <style>
      /* Initial loading styles */
      #app-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0e1c2d;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      #app-loader.hidden {
        display: none;
      }
      .loader-content {
        text-align: center;
        opacity: 0;
        transition: opacity 1.5s ease-in;
      }
      .loader-content.visible {
        opacity: 1;
      }
      .loader-mascot {
        margin: 0 auto;
      }
      .loader-mascot img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
      }
      @keyframes fadeOut {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }
      #app-loader.fade-out {
        animation: fadeOut 0.75s ease-out forwards;
      }
    </style>
  </head>
  <body>
    <!-- Loading screen (outside #app so Vue doesn't replace it) -->
    <div id="app-loader">
      <div class="loader-content">
        <div class="loader-mascot">
          <img
            src="/giljo_logo.png"
            alt="GiljoAI Logo">
        </div>
      </div>
    </div>

    <!-- Vue app container -->
    <div id="app"></div>

    <!-- Runtime API configuration (before Vue loads) -->
    <script>
      // Set API base URL based on current hostname and protocol
      // This runs BEFORE Vite/Vue loads, so it's available to all code
      const currentHost = window.location.hostname;
      const apiPort = window.location.port || 7272;
      const apiProtocol = window.location.protocol === 'https:' ? 'https' : 'http';
      window.API_BASE_URL = `${apiProtocol}://${currentHost}:${apiPort}`;
      console.log('[Config] Runtime API URL:', window.API_BASE_URL);
    </script>

    <script type="module" src="/src/main.js"></script>
    <script>
      console.log('[SPLASH] Script initialized');

      // Check if this is the first load of the session
      const hasShownSplash = sessionStorage.getItem('splashShown');
      const loader = document.getElementById('app-loader');

      if (hasShownSplash) {
        // Not first load - hide splash immediately
        console.log('[SPLASH] Already shown this session - hiding immediately');
        if (loader) {
          loader.classList.add('hidden');
        }
      } else {
        // First load - wait for logo image then fade in
        console.log('[SPLASH] First load - waiting for logo before fade-in');

        if (loader) {
          const loaderContent = loader.querySelector('.loader-content');
          const logoImg = loader.querySelector('img');
          let splashStarted = false;

          function startSplash() {
            if (splashStarted) return;
            splashStarted = true;
            console.log('[SPLASH] Image ready - starting fade in');
            loaderContent.classList.add('visible');

            // After fade-in (1.5s) + hold (1s), start fade-out
            setTimeout(function() {
              console.log('[SPLASH] Starting fade out');
              loader.classList.add('fade-out');
              setTimeout(function() {
                console.log('[SPLASH] Hiding loader');
                loader.classList.add('hidden');
                sessionStorage.setItem('splashShown', 'true');
                console.log('[SPLASH] Splash screen complete');
              }, 750);
            }, 2500);
          }

          if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
            console.log('[SPLASH] Image already cached - starting immediately');
            startSplash();
          } else if (logoImg) {
            console.log('[SPLASH] Waiting for image to load over network');
            logoImg.addEventListener('load', startSplash);
            logoImg.addEventListener('error', startSplash);
            // Fallback: don't wait forever if image is extremely slow
            setTimeout(function() {
              if (!splashStarted) {
                console.log('[SPLASH] Image load timeout after 5s - proceeding');
                startSplash();
              }
            }, 5000);
          } else {
            startSplash();
          }
        } else {
          console.error('[SPLASH] Loader element not found!');
        }
      }

      console.log('[SPLASH] Script ready');
    </script>
  </body>
</html>
