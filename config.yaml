# GiljoAI MCP Configuration
# Designed to avoid conflicts with AKE-MCP running on ports 5000-5002

# Current AKE-MCP Port Usage:
# - Dashboard: 5000
# - MCP Server: 5001  
# - Port Lock: 5002

# GiljoAI MCP Port Assignments (non-conflicting):
server:
  mode: local  # local, lan, wan
  
  # FastMCP Server Configuration
  mcp:
    host: "127.0.0.1"
    port: 6001  # Changed from 5001 to avoid AKE-MCP conflict
    transport: stdio  # For MCP protocol
    
  # REST API Configuration  
  api:
    host: "127.0.0.1"
    port: 6002  # New port for REST API
    cors_enabled: true
    
  # WebSocket Configuration
  websocket:
    enabled: true
    port: 6003  # Dedicated WebSocket port
    
  # Dashboard Configuration
  dashboard:
    enabled: true
    host: "127.0.0.1"
    port: 6000  # Changed from 5000 to avoid AKE-MCP conflict
    dev_server_port: 5173  # Vite dev server (Vue dashboard)
    
database:
  # Default to SQLite for development
  type: sqlite
  sqlite:
    path: "./data/giljo_mcp.db"
    
  # PostgreSQL configuration (when ready)
  postgresql:
    host: "localhost"
    port: 5432
    database: "giljo_mcp_db"
    user: "postgres"
    password: ""  # Set via environment variable
    pool_size: 10
    
# Logging Configuration
logging:
  level: INFO
  file: "./logs/giljo_mcp.log"
  max_size: "10MB"
  max_files: 5
  
# Session Configuration  
session:
  timeout: 3600  # 1 hour
  max_concurrent: 10
  cleanup_interval: 300  # 5 minutes
  
# Agent Configuration
agents:
  max_per_project: 20
  context_limit: 150000  # tokens
  handoff_threshold: 140000  # trigger handoff at 140K
  
# Message Queue Configuration
messages:
  max_queue_size: 1000
  batch_size: 10
  retry_attempts: 3
  retry_delay: 1  # seconds
  
# Development Settings
development:
  debug: true
  hot_reload: true
  mock_agents: false
  
# Production Settings  
production:
  debug: false
  hot_reload: false
  use_ssl: true
  ssl_cert: ""
  ssl_key: ""
  
# Feature Flags
features:
  vision_chunking: true
  multi_tenant: true
  websocket_updates: true
  auto_handoff: true
  dynamic_discovery: true
  
# Integration with AKE-MCP (during transition)
ake_mcp:
  enabled: true  # Use AKE-MCP as orchestrator during alpha
  url: "http://localhost:5000"  # AKE-MCP dashboard
  api_url: "http://localhost:5001"  # AKE-MCP server
  
# Environment Variable Overrides
# Any setting can be overridden with environment variables
# Format: GILJO_MCP_<SECTION>_<KEY>
# Example: GILJO_MCP_SERVER_MCP_PORT=7001