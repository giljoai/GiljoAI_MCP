installation:
  version: 2.0.0
  mode: localhost
  timestamp: '2025-10-05T11:11:31.939551'
  platform: Windows
  python_version: 3.11.9
  install_dir: F:\GiljoAI_MCP
database:
  type: postgresql
  version: '16'
  host: localhost
  port: 5432
  name: giljo_mcp
  user: giljo_user
  owner: giljo_owner
  pool_size: 5
services:
  api:
    host: 127.0.0.1
    port: 7272
    unified_port: true
    description: Main API server (REST + WebSocket + MCP)
  frontend:
    port: 7274
    dev_server: true
    auto_open: false
features:
  vision_chunking: true
  multi_tenant: true
  websocket: true
  auto_handoff: true
  dynamic_discovery: true
  ssl_enabled: false
  api_keys_required: false
  multi_user: false
paths:
  install_dir: F:\GiljoAI_MCP
  data: F:\GiljoAI_MCP\data
  logs: F:\GiljoAI_MCP\logs
  uploads: F:\GiljoAI_MCP\uploads
  temp: F:\GiljoAI_MCP\temp
  static: F:\GiljoAI_MCP\frontend\dist
  templates: F:\GiljoAI_MCP\frontend\templates
  certs: null
logging:
  level: DEBUG
  file: ./logs/giljo_mcp.log
  max_size: 10MB
  backup_count: 5
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
agent:
  max_per_project: 20
  context_limit: 150000
  handoff_threshold: 140000
  default_role: orchestrator
session:
  timeout_seconds: 3600
  max_concurrent: 10
  cleanup_interval: 300
  cookie_secure: false
message_queue:
  max_size: 1000
  batch_size: 10
  retry_attempts: 3
  retry_delay: 1.0
  priority_levels:
  - low
  - normal
  - high
  - critical
security:
  cors:
    allowed_origins:
      - http://127.0.0.1:7274
      - http://localhost:7274
      # Add specific LAN IPs when deploying to server mode
      # Example: - http://192.168.1.100:7274
  api_keys:
    require_for_modes:
      - server
      - lan
      - wan
    # Generate keys using: python -c "import secrets; print(f'giljo_lan_{secrets.token_urlsafe(32)}')"
  rate_limiting:
    enabled: true
    requests_per_minute: 60
status:
  installation_complete: true
  database_created: true
  migrations_run: false
  services_configured: true
  ready_to_launch: true
