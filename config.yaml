installation:
  version: 2.0.0
  mode: localhost
  timestamp: "2025-10-02T13:04:52.035070"
  platform: Windows
  python_version: 3.13.7
database:
  type: postgresql
  version: "16"
  host: localhost
  port: 5432
  name: giljo_mcp
  user: giljo_user
  owner: giljo_owner
  pool_size: 5
services:
  api:
    host: 127.0.0.1
    port: 7272
    unified_port: true
    description: Main API server (REST + WebSocket + MCP)
  frontend:
    port: 7274
    dev_server: true
    auto_open: true
features:
  vision_chunking: true
  multi_tenant: true
  websocket: true
  auto_handoff: true
  dynamic_discovery: true
  ssl_enabled: false
  api_keys_required: false
  multi_user: false
paths:
  data: ./data
  logs: ./logs
  uploads: ./uploads
  temp: ./temp
  static: ./frontend/dist
  templates: ./frontend/templates
  certs: null
logging:
  level: DEBUG
  file: ./logs/giljo_mcp.log
  max_size: 10MB
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
agent:
  max_per_project: 20
  context_limit: 150000
  handoff_threshold: 140000
  default_role: orchestrator
session:
  timeout_seconds: 3600
  max_concurrent: 10
  cleanup_interval: 300
  cookie_secure: false
message_queue:
  max_size: 1000
  batch_size: 10
  retry_attempts: 3
  retry_delay: 1.0
  priority_levels:
    - low
    - normal
    - high
    - critical
status:
  installation_complete: true
  database_created: true
  migrations_run: false
  services_configured: true
  ready_to_launch: true
