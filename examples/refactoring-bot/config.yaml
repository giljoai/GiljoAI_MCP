# Refactoring Bot Configuration
# Customize these settings for your specific needs

project:
  name: "Legacy Code Refactoring"
  tenant_key: "refactor-bot-demo"

# Agent configuration
agents:
  analyzer:
    template: "code_analyzer"
    timeout: 60
    config:
      metrics:
        - complexity
        - coverage
        - duplication
        - maintainability
      thresholds:
        max_complexity: 10
        min_coverage: 80
        max_duplication: 5

  linter:
    template: "style_checker"
    timeout: 30
    config:
      tools:
        - black
        - ruff
        - mypy
      auto_fix: true
      strict_mode: false

  refactor:
    template: "code_transformer"
    timeout: 20
    config:
      transformations:
        - split_complex_functions
        - add_type_hints
        - modernize_syntax
        - extract_constants
        - rename_variables
      preserve_api: true
      safe_mode: true

  validator:
    template: "test_runner"
    timeout: 120
    config:
      test_suites:
        - unit
        - integration
        - performance
      fail_fast: false
      compare_baseline: true

# Refactoring rules
refactoring:
  python:
    # Complexity thresholds
    max_function_lines: 50
    max_cyclomatic_complexity: 10
    max_cognitive_complexity: 15

    # Naming conventions
    naming:
      classes: PascalCase
      functions: snake_case
      constants: UPPER_SNAKE_CASE
      private_methods: _snake_case

    # Modern syntax transformations
    modernize:
      - "% formatting -> f-strings"
      - ".format() -> f-strings"
      - "dict() -> {}"
      - "list() -> []"
      - "== None -> is None"
      - "!= None -> is not None"

    # Documentation requirements
    documentation:
      require_docstrings: true
      require_type_hints: true
      docstring_style: "google"

# Workflow configuration
workflow:
  phases:
    - name: "analysis"
      description: "Scan codebase for issues"
      parallel: false

    - name: "linting"
      description: "Check and fix style violations"
      parallel: false

    - name: "refactoring"
      description: "Apply transformations"
      parallel: true  # Can refactor multiple files in parallel

    - name: "validation"
      description: "Run tests and verify"
      parallel: false

    - name: "reporting"
      description: "Generate final report"
      parallel: false

  # Stop conditions
  stop_on_test_failure: true
  stop_on_performance_regression: true
  max_iterations: 3  # Maximum refactoring iterations

# Output configuration
output:
  report_format: "json"  # json, html, markdown
  save_metrics: true
  create_backup: true
  git_branch: "auto-refactor"
  commit_message: "refactor: automated code quality improvements"

# Performance settings
performance:
  max_workers: 4
  batch_size: 10  # Files to process per batch
  memory_limit: "2GB"
  timeout_total: 3600  # 1 hour total timeout