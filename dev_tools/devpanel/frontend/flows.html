<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Developer Panel • Flow Diagrams</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg-900: #020617;
        --bg-800: #0b1220;
        --bg-700: #111927;
        --accent-400: #facc15;
        --accent-300: #38bdf8;
        --text-primary: #f8fafc;
        --text-muted: #94a3b8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg-900);
        color: var(--text-primary);
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
        display: grid;
        grid-template-columns: 280px 1fr;
      }
      nav {
        background: var(--bg-800);
        border-right: 1px solid rgba(148, 163, 184, 0.12);
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      nav h1 { margin: 0; font-size: 1.3rem; color: var(--accent-400); }
      nav p { margin: 0; color: var(--text-muted); }
      nav button {
        all: unset;
        display: block;
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid transparent;
        color: inherit;
        cursor: pointer;
        margin-bottom: 10px;
      }
      nav button.active {
        border-color: rgba(250, 204, 21, 0.4);
        background: rgba(250, 204, 21, 0.1);
        color: var(--accent-400);
      }
      main {
        padding: 28px 32px;
        display: grid;
        gap: 18px;
        background: radial-gradient(circle at top, rgba(250, 204, 21, 0.04), transparent 60%);
      }
      .diagram-container {
        background: var(--bg-800);
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 18px 30px rgba(2, 6, 23, 0.55);
      }
      #flow-canvas {
        width: 100%;
        height: 520px;
        background: var(--bg-900);
        border-radius: 12px;
      }
      .details-panel {
        background: var(--bg-700);
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.12);
        padding: 14px;
      }
      .details-panel h3 {
        margin-top: 0;
        color: var(--accent-300);
      }
      ul {
        padding-left: 20px;
      }
      li { margin-bottom: 6px; }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(56, 189, 248, 0.18);
        color: var(--accent-300);
        font-size: 0.8rem;
      }

      .flow-tooltip {
        position: fixed;
        z-index: 9999;
        pointer-events: none;
        background: rgba(15, 23, 42, 0.92);
        color: #e2e8f0;
        border: 1px solid rgba(250, 204, 21, 0.6);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 0.8rem;
        box-shadow: 0 8px 18px rgba(2, 6, 23, 0.55);
        display: none;
        max-width: 220px;
      }
      @media (max-width: 960px) {
        body { grid-template-columns: 1fr; }
        nav { position: sticky; top: 0; z-index: 5; }
      }
    </style>
  </head>
  <body>
    <nav>
      <div>
        <h1>Flow Library</h1>
        <p>Select a workflow to visualize its steps and branches.</p>
      </div>
      <div id="flow-nav"></div>
      <a href="index.html" style="color: var(--accent-300); text-decoration: none;">← Back to Developer Panel</a>
    </nav>
    <main>
      <div class="diagram-container">
        <div class="badge" id="flow-title">Start to Finish Agent Flow</div>
        <div id="flow-canvas"></div>
      </div>
      <div class="details-panel" id="flow-details">
        <h3>Step Details</h3>
        <p>Select a node to view notes.</p>
      </div>
    </main>
    <script>
      const manualFlows = {
        installation: {
          title: 'Installation Flow',
          elements: [
            { data: { id: 'i1', label: 'Run install.py' } },
            { data: { id: 'i2', label: 'Detect Platform\n& Prereqs' } },
            { data: { id: 'i3', label: 'DB + Migrations' } },
            { data: { id: 'i4', label: 'Seed Templates\n+ Setup State' } },
            { data: { id: 'i5', label: 'Create Admin\n/ Launch UI' } },
            { data: { id: 'ei1', source: 'i1', target: 'i2' } },
            { data: { id: 'ei2', source: 'i2', target: 'i3' } },
            { data: { id: 'ei3', source: 'i3', target: 'i4' } },
            { data: { id: 'ei4', source: 'i4', target: 'i5' } },
          ],
          details: {
            i1: ['User executes `python install.py` with optional flags (headless, --dev-tools, etc.).'],
            i2: ['Installer validates OS, Python/Pip versions, ensures dependencies present.'],
            i3: ['Creates PostgreSQL database, applies migrations, configures connections.'],
            i4: ['Seeds default templates, writes setup_state entries, config.yaml, .env.'],
            i5: ['Launches /welcome for admin creation, starts services, ready for login.'],
          },
        },
        tasks: {
          title: 'Task Creation & Conversion',
          elements: [
            { data: { id: 't1', label: 'Open Tasks UI / CLI' } },
            { data: { id: 't2', label: 'Select Product\nor Active Product?' } },
            { data: { id: 't3', label: 'Create Task\n(assign, priority, etc.)' } },
            { data: { id: 't4', label: 'Notify Agents / MCP tools' } },
            { data: { id: 't5', label: 'Optional: Convert\nto Project' } },
            { data: { id: 'et1', source: 't1', target: 't2' } },
            { data: { id: 'et2', source: 't2', target: 't3' } },
            { data: { id: 'et3', source: 't3', target: 't4' } },
            { data: { id: 'et4', source: 't4', target: 't5' } },
          ],
          details: {
            t1: ['User opens Tasks module or uses MCP `create_task` tool.'],
            t2: ['If no active product, user must choose; otherwise default is applied.'],
            t3: ['Task saved with description, assignee, context budget.'],
            t4: ['WebSocket + MCP notifications sent to relevant agents.'],
            t5: ['Task can be escalated to project, entering staging → orchestration flow.'],
          },
        },
      };

      const flowNav = document.getElementById('flow-nav');
      const flowTitle = document.getElementById('flow-title');
      const flowDetails = document.getElementById('flow-details');
      const cyContainer = document.getElementById('flow-canvas');
      const flowTooltip = document.getElementById('flow-tooltip');
      let cyInstance = null;

      const flows = [
        { key: 'start', label: 'Start → Finish Agent Flow', type: 'json', path: './start_to_finish_flow.json' },
        { key: 'installation', label: 'Installation Flow', type: 'manual' },
        { key: 'tasks', label: 'Task Creation Flow', type: 'manual' },
      ];

      flows.forEach((flow, idx) => {
        const btn = document.createElement('button');
        btn.textContent = flow.label;
        if (idx === 0) btn.classList.add('active');
        btn.addEventListener('click', () => {
          flowNav.querySelectorAll('button').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          loadFlow(flow);
        });
        flowNav.appendChild(btn);
      });

      function loadFlow(flow) {
        flowTitle.textContent = flow.label;
        if (flow.type === 'json') {
          fetch(flow.path)
            .then((res) => (res.ok ? res.json() : null))
            .then((data) => initCy(data, flowDetails))
            .catch(() => initCy(null, flowDetails));
        } else {
          initCy(manualFlows[flow.key] || null, flowDetails);
        }
      }

      function initCy(flowData, detailsEl) {
        if (!cyContainer) return;
        if (cyInstance) cyInstance.destroy();
        if (!flowData) {
          cyContainer.innerHTML = '<p style="padding:12px; color: var(--text-muted);">Unable to load flow data.</p>';
          if (detailsEl) {
            detailsEl.innerHTML = '<h3>Step Details</h3><p>Flow data unavailable.</p>';
          }
          return;
        }

        const elements = flowData.elements
          ? flowData.elements
          : (flowData.nodes || []).concat(flowData.edges || []);
        const detailsMap = flowData.details || Object.fromEntries((flowData.nodes || []).map((n) => [n.data.id, n.data.details || []]));

        cyInstance = cytoscape({
          container: cyContainer,
          elements,
          style: [
            {
              selector: 'node',
              style: {
                'background-color': '#1d2440',
                color: '#f8fafc',
                label: 'data(label)',
                'text-wrap': 'wrap',
                'text-max-width': 260,
                'font-size': 12,
                'text-valign': 'center',
                'text-halign': 'center',
                'border-width': 2,
                'border-color': '#facc15',
                'padding': '18px',
                'shape': 'round-rectangle',
                'width': 220,
                'height': 'label',
                'text-margin-y': 0,
                'text-events': 'yes',
              },
            },
            {
              selector: 'edge',
              style: {
                width: 3,
                'line-color': '#38bdf8',
                'target-arrow-color': '#38bdf8',
                'target-arrow-shape': 'triangle',
                'curve-style': 'unbundled-bezier',
                'control-point-distances': 60,
                'control-point-weights': 0.2,
                'text-background-color': '#0f172a',
                'text-background-opacity': 0.85,
                'text-background-padding': 4,
                'font-size': 11,
                color: '#e2e8f0',
                label: 'data(label)',
              },
            },
          ],
          layout: { name: 'breadthfirst', directed: true, padding: 10, spacingFactor: 0.5 },
        });

        const showTooltip = (content, renderedPos) => {
          if (!flowTooltip) return;
          const rect = cyContainer.getBoundingClientRect();
          const left = rect.left + window.scrollX + renderedPos.x + 14;
          const top = rect.top + window.scrollY + renderedPos.y + 14;
          flowTooltip.innerHTML = content;
          flowTooltip.style.left = `${left}px`;
          flowTooltip.style.top = `${top}px`;
          flowTooltip.style.display = 'block';
        };

        const hideTooltip = () => {
          if (flowTooltip) flowTooltip.style.display = 'none';
        };

        cyInstance.on('tap', 'node', (evt) => {
          const data = evt.target.data();
          const notes = detailsMap[data.id] || [];
          detailsEl.innerHTML = `<h3>${data.label || 'Step'}</h3><ul>${
            notes.length ? notes.map((n) => `<li>${n}</li>`).join('') : '<li class="muted">No details documented.</li>'
          }</ul>`;
        });

        cyInstance.on('mouseover', 'node', (evt) => {
          const data = evt.target.data();
          const notes = detailsMap[data.id] || [];
          const summary = notes[0] || 'Click for details.';
          const content = `<strong>${data.label || 'Step'}</strong><br>${summary}`;
          showTooltip(content, evt.renderedPosition);
        });

        cyInstance.on('mouseout', 'node', hideTooltip);

        cyInstance.on('mouseover', 'edge', (evt) => {
          const data = evt.target.data();
          const content = data.label ? `<strong>${data.label}</strong>` : `<strong>${data.source} → ${data.target}</strong>`;
          showTooltip(content, evt.renderedPosition);
        });

        cyInstance.on('mouseout', 'edge', hideTooltip);

        const firstNode = cyInstance.nodes()[0];
        if (firstNode) {
          firstNode.emit('tap');
        } else {
          detailsEl.innerHTML = '<h3>Step Details</h3><p>Select a node to view notes.</p>';
        }
      }

      loadFlow(flows[0]);
    </script>
    <div id="flow-tooltip" class="flow-tooltip"></div>
  </body>
</html>
