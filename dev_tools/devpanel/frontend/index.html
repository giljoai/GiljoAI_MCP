<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Developer Panel (Standalone)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }
      nav {
        background: #0f172a;
        color: #e2e8f0;
        padding: 1.5rem;
      }
      nav h1 {
        font-size: 1.4rem;
        margin: 0 0 1rem;
      }
      nav ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 0.25rem;
      }
      nav button {
        width: 100%;
        padding: 0.35rem 0.5rem;
        border-radius: 6px;
        border: none;
        background: rgba(226, 232, 240, 0.12);
        color: inherit;
        cursor: pointer;
        text-align: left;
      }
      nav button.active {
        background: #38bdf8;
        color: #0f172a;
        font-weight: 600;
      }
      main {
        padding: 2rem;
        overflow-y: auto;
        background: #f1f5f9;
      }
      .card {
        background: white;
        border-radius: 12px;
        padding: 1.25rem;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.12);
        margin-bottom: 1rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border-bottom: 1px solid #e2e8f0;
        padding: 0.5rem 0.25rem;
        text-align: left;
      }
      pre {
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 8px;
        padding: 1rem;
        overflow-x: auto;
      }
      .muted {
        color: #475569;
      }
    </style>
  </head>
  <body>
    <nav>
      <h1>Dev Panel</h1>
      <ul id="nav"></ul>
      <button id="refresh" style="margin-top: 1rem;">Refresh</button>
      <p id="status" class="muted" style="margin-top: 0.5rem;"></p>
    </nav>
    <main>
      <section class="card">
        <h2 id="section-title">Overview</h2>
        <p id="section-description" class="muted">Select a section to view inventory data.</p>
      </section>
      <section id="content"></section>
    </main>
    <script>
      const API_ROOT = 'http://127.0.0.1:8283';
      const sections = [
        { id: 'overview', label: 'Overview', endpoint: 'health' },
        { id: 'api-catalog', label: 'API Catalog', endpoint: 'api-catalog' },
        { id: 'mcp-tools', label: 'MCP Tools', endpoint: 'mcp-tools' },
        { id: 'agents-templates', label: 'Agents & Templates', endpoint: 'agents-templates' },
        { id: 'db-schema', label: 'Database Schema', endpoint: 'db-schema' },
        { id: 'dependency-index', label: 'Dependency Index', endpoint: 'dependency-index' },
        { id: 'flows', label: 'Flows', endpoint: 'flows' },
        { id: 'tech-stack', label: 'Tech Stack', endpoint: 'tech-stack' },
        { id: 'search-index', label: 'Search Index', endpoint: 'search-index' }
      ];

      const navEl = document.getElementById('nav');
      const statusEl = document.getElementById('status');
      const titleEl = document.getElementById('section-title');
      const descEl = document.getElementById('section-description');
      const contentEl = document.getElementById('content');

      let current = 'overview';
      let cache = {};

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? '#ef4444' : '#475569';
      }

      async function fetchSection(section) {
        setStatus('Loading ' + section.label + '…');
        try {
          const response = await fetch(`${API_ROOT}/${section.endpoint}`);
          if (!response.ok) {
            throw new Error(`${response.status} ${response.statusText}`);
          }
          const data = await response.json();
          cache[section.id] = data;
          renderSection(section, data);
          setStatus('Ready');
        } catch (error) {
          setStatus(error.message, true);
          contentEl.innerHTML = `<div class="card"><strong>Error:</strong> ${error.message}</div>`;
        }
      }

      function renderSection(section, data) {
        current = section.id;
        document.querySelectorAll('nav button').forEach((btn) => {
          btn.classList.toggle('active', btn.dataset.section === section.id);
        });

        titleEl.textContent = section.label;
        descEl.textContent = `Endpoint: /${section.endpoint}`;

        if (section.id === 'overview') {
          const items = Object.entries(data.inventories || {}).map(
            ([name, exists]) => `<tr><td>${name}</td><td>${exists ? '✅' : '⛔️'}</td></tr>`
          ).join('');
          contentEl.innerHTML = `<article class="card"><h3>Inventory Files</h3><table>${items}</table></article>`;
          return;
        }

        contentEl.innerHTML = `<article class="card"><pre>${JSON.stringify(data, null, 2)}</pre></article>`;
      }

      document.getElementById('refresh').addEventListener('click', () => {
        cache = {};
        const section = sections.find((s) => s.id === current) || sections[0];
        fetchSection(section);
      });

      sections.forEach((section) => {
        const btn = document.createElement('button');
        btn.textContent = section.label;
        btn.dataset.section = section.id;
        btn.addEventListener('click', () => {
          if (cache[section.id]) {
            renderSection(section, cache[section.id]);
          } else {
            fetchSection(section);
          }
        });
        navEl.appendChild(btn);
      });

      fetchSection(sections[0]);
    </script>
  </body>
</html>
