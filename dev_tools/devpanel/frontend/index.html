<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Developer Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark;
        --bg-900: #020617;
        --bg-800: #0b1220;
        --bg-700: #111927;
        --bg-600: #1e293b;
        --accent-500: #38bdf8;
        --accent-400: #67e8f9;
        --heading-color: #facc15;
        --accent-muted: rgba(56, 189, 248, 0.15);
        --text-primary: #e2e8f0;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --danger: #f87171;
        --success: #34d399;
        --warning: #facc15;
        --chip-bg: rgba(96, 165, 250, 0.2);
        --chip-text: #bfdbfe;
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      }

      .flow-wrapper {
        display: grid;
        gap: 18px;
      }

      .flow-nav {
        display: flex;
        gap: 12px;
        align-items: center;
        background: var(--bg-800);
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.12);
        padding: 12px 16px;
      }

      .flow-nav label {
        font-size: 0.9rem;
        color: var(--text-muted);
      }

      .flow-nav select {
        background: var(--bg-700);
        color: var(--text-primary);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 10px;
        padding: 8px 10px;
      }

      .flow-diagram {
        background: var(--bg-800);
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.12);
        padding: 18px;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.32);
        display: grid;
        gap: 16px;
      }

      .flow-details {
        background: var(--bg-700);
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.12);
        padding: 12px;
        color: var(--text-secondary);
      }

      .start-flow {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 6px 0;
      }

      .start-node {
        background: var(--bg-800);
        border: 1px solid rgba(56, 189, 248, 0.5);
        border-radius: 14px;
        padding: 12px 16px;
        min-width: 160px;
        color: var(--text-primary);
        cursor: pointer;
        box-shadow: 0 10px 18px rgba(15, 23, 42, 0.35);
      }

      .start-node:focus,
      .start-node:hover {
        border-color: var(--heading-color);
      }

      .start-connector {
        width: 2px;
        height: 24px;
        background: rgba(56, 189, 248, 0.3);
        margin: 0 auto;
      }

      .start-connector::after {
        content: '';
        display: block;
        width: 0;
        height: 0;
        margin: 0 auto;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-top: 8px solid rgba(56, 189, 248, 0.3);
      }

      .flow-diagram header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .flow-diagram header h4 {
        margin: 0;
        font-size: 1.15rem;
        color: var(--heading-color);
      }

      .flow-diagram header span {
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .flow-lanes {
        display: grid;
        gap: 20px;
      }

      @media (min-width: 1024px) {
        .flow-lanes {
          grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }
      }

      .flow-lane {
        background: var(--bg-700);
        border-radius: 14px;
        padding: 14px;
        border: 1px solid rgba(148, 163, 184, 0.14);
      }

      .flow-lane h5 {
        margin: 0 0 12px;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--heading-color);
      }

      .flow-steps {
        position: relative;
        padding-left: 18px;
        display: grid;
        gap: 12px;
      }

      .flow-steps::before {
        content: "";
        position: absolute;
        left: 6px;
        top: 8px;
        bottom: 8px;
        width: 2px;
        background: rgba(56, 189, 248, 0.25);
      }

      .flow-step {
        background: var(--bg-800);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 12px;
        padding: 10px 12px 10px 16px;
        display: grid;
        gap: 4px;
        position: relative;
      }

      .flow-step::before {
        content: "";
        position: absolute;
        left: -15px;
        top: 14px;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--bg-800);
        border: 2px solid var(--accent-500);
      }

      .flow-step[data-type="decision"] {
        border-color: rgba(250, 204, 21, 0.4);
        background: rgba(250, 204, 21, 0.08);
      }

      .flow-step[data-type="warning"] {
        border-color: rgba(248, 113, 113, 0.35);
        background: rgba(248, 113, 113, 0.08);
      }

      .flow-step strong {
        color: var(--heading-color);
        font-size: 0.95rem;
      }

      .flow-step p {
        margin: 0;
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      .flow-step footer {
        font-size: 0.75rem;
        color: var(--text-muted);
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg-900);
        color: var(--text-primary);
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }

      nav {
        background: var(--bg-800);
        border-right: 1px solid rgba(148, 163, 184, 0.1);
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      nav header h1 {
        margin: 0;
        font-size: 1.4rem;
        font-weight: 600;
        color: var(--heading-color);
      }

      nav header p {
        margin: 6px 0 0;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .status-banner {
        background: rgba(52, 211, 153, 0.15);
        color: var(--success);
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 0.85rem;
      }

      .search-box input {
        width: 100%;
        background: var(--bg-700);
        border: 1px solid rgba(148, 163, 184, 0.2);
        color: var(--text-primary);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.95rem;
      }

      .cta-card {
        background: var(--bg-700);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 14px;
        padding: 14px;
        display: grid;
        gap: 8px;
      }

      .cta-card a {
        color: var(--heading-color);
        text-decoration: none;
        font-weight: 600;
      }

      .nav-groups {
        flex: 1 1 auto;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .nav-group h3 {
        margin: 0 0 8px;
        color: var(--text-muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .nav-group ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 6px;
      }

      .nav-group button {
        all: unset;
        background: var(--bg-700);
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: background 0.2s ease;
      }

      .nav-group button span {
        font-size: 0.95rem;
      }

      .nav-group button small {
        color: var(--text-muted);
        font-size: 0.75rem;
      }

      .nav-group button:hover {
        background: rgba(56, 189, 248, 0.15);
      }

      .nav-group button.active {
        background: rgba(56, 189, 248, 0.25);
        color: var(--accent-400);
        border: 1px solid rgba(56, 189, 248, 0.4);
      }

      main {
        background: radial-gradient(circle at top, rgba(56, 189, 248, 0.05), transparent 55%), var(--bg-900);
        display: flex;
        flex-direction: column;
        padding: 28px 32px;
        gap: 24px;
        overflow-y: auto;
      }

      .header-section h2 {
        margin: 0;
        font-size: 2rem;
        font-weight: 600;
        color: var(--heading-color);
      }

      .header-section p {
        margin: 8px 0 0;
        color: var(--text-muted);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.8rem;
        background: rgba(56, 189, 248, 0.2);
        color: var(--accent-400);
        margin-right: 10px;
      }

      .content-area {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .card-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }

      details {
        background: var(--bg-800);
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 14px;
        box-shadow: 0 14px 24px rgba(15, 23, 42, 0.28);
        padding: 0;
      }

      details + details {
        margin-top: 12px;
      }

      summary {
        padding: 14px 16px;
        cursor: pointer;
        font-weight: 600;
        color: var(--heading-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      summary::marker {
        display: none;
      }

      details[open] summary {
        border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      }

      .collapsible-content {
        padding: 16px;
      }

      .card {
        overflow-wrap: anywhere;
        background: var(--bg-800);
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.12);
        padding: 18px;
        box-shadow: 0 18px 30px rgba(15, 23, 42, 0.3);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .card h3 {
        margin: 0;
        font-size: 1.05rem;
        color: var(--heading-color);
      }

      .card p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 0.92rem;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--chip-bg);
        color: var(--chip-text);
        font-size: 0.75rem;
      }

      .chip--danger {
        background: rgba(248, 113, 113, 0.2);
        color: #fecaca;
      }

      .chip--success {
        background: rgba(52, 211, 153, 0.2);
        color: #a7f3d0;
      }

      .muted {
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .section-block {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .table {
        width: 100%;
        border-collapse: collapse;
        background: var(--bg-800);
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.12);
      }

      .table thead {
        background: rgba(56, 189, 248, 0.08);
        color: var(--accent-400);
      }

      .table th,
      .table td {
        padding: 12px 16px;
        text-align: left;
        border-bottom: 1px solid rgba(148, 163, 184, 0.08);
        font-size: 0.88rem;
      }

      .table tbody tr:last-child td {
        border-bottom: none;
      }

      .list-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .timeline {
        position: relative;
        padding-left: 28px;
        margin-left: 8px;
      }

      .timeline::before {
        content: "";
        position: absolute;
        left: 10px;
        top: 6px;
        bottom: 6px;
        width: 2px;
        background: rgba(56, 189, 248, 0.35);
      }

      .timeline-item {
        position: relative;
        padding: 8px 0 8px 18px;
      }

      .timeline-item::before {
        content: "";
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--bg-900);
        border: 2px solid var(--accent-500);
        left: -19px;
        top: 12px;
      }

      .timeline-item h4 {
        margin: 0;
        font-size: 1rem;
      }

      .timeline-item small {
        color: var(--text-muted);
        font-size: 0.75rem;
      }

      .flow-file {
        font-weight: 600;
        color: var(--accent-400);
      }

      .detail-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .detail-box {
        background: var(--bg-700);
        border-radius: 12px;
        padding: 12px;
        border: 1px solid rgba(148, 163, 184, 0.1);
        font-size: 0.88rem;
      }

      .detail-box strong {
        display: block;
        color: var(--text-secondary);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }

      .list-column {
        display: grid;
        gap: 6px;
        padding-left: 16px;
      }

      .section-heading {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 6px;
      }

      .section-heading h3 {
        margin: 0;
        font-size: 1.2rem;
        color: var(--heading-color);
      }

      .section-heading span {
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .search-results {
        border: 1px solid rgba(56, 189, 248, 0.35);
        background: rgba(56, 189, 248, 0.08);
        padding: 16px;
        border-radius: 14px;
        display: grid;
        gap: 12px;
      }

      .search-results article {
        background: var(--bg-800);
        border-radius: 12px;
        padding: 12px 16px;
        border: 1px solid rgba(148, 163, 184, 0.1);
        display: grid;
        gap: 6px;
      }

      .search-results header {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .search-results footer {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        color: var(--text-muted);
        font-size: 0.8rem;
      }

      @media (max-width: 960px) {
        body {
          grid-template-columns: 1fr;
        }
        nav {
          position: sticky;
          top: 0;
          z-index: 5;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <header>
        <h1>Developer Panel</h1>
        <p>Interactive reference for APIs, tools, templates, and flows.</p>
      </header>

      <div class="status-banner" id="status-banner">Loading inventories…</div>

      <div class="search-box">
        <input id="search-input" type="search" placeholder="Search across APIs, tools, templates…" />
      </div>

      <div class="nav-groups" id="nav-groups"></div>
    </nav>

    <main>
      <section class="header-section">
        <div class="badges" id="badge-container"></div>
        <h2 id="section-title">Overview</h2>
        <p id="section-description">Consolidated inventory status and snapshot across the orchestration platform.</p>
      </section>

      <section class="content-area" id="content"></section>
    </main>

    <script>
      const API_ROOT = 'http://127.0.0.1:8283';

      const sections = [
        { id: 'overview', label: 'Overview', endpoint: 'health', description: 'Inventory health, availability, and quick metrics.' },
        { id: 'architecture', label: 'Architecture & Flows', endpoint: 'flows', description: 'Installation, orchestration, and event flows visualized.' },
        { id: 'tech-stack', label: 'Tech Stack', endpoint: 'tech-stack', description: 'Backend/frontend dependencies and deprecation notes.' },
        { id: 'apis', label: 'API Catalog', endpoint: 'api-catalog', description: 'FastAPI routes grouped by domain with summaries.' },
        { id: 'mcp-tools', label: 'MCP Tools', endpoint: 'mcp-tools', description: 'HTTP-accessible tools organized by capability.' },
        { id: 'agents-templates', label: 'Agents & Templates', endpoint: 'agents-templates', description: 'Default agent templates, behaviors, and success criteria.' },
        { id: 'database', label: 'Database Schema', endpoint: 'db-schema', description: 'Tables, columns, and relationships derived from SQLAlchemy.' },
        { id: 'dependencies', label: 'Dependency Explorer', endpoint: 'dependency-index', description: 'Module import graph for backend and API modules.' },
        { id: 'search', label: 'Search Index', endpoint: 'search-index', description: 'Aggregated entries feeding global search.' },
      ];

      const navGroups = [
        { title: 'System Snapshot', items: ['overview', 'architecture', 'tech-stack'] },
        { title: 'Catalogs', items: ['apis', 'mcp-tools', 'agents-templates', 'database'] },
        { title: 'Exploration', items: ['dependencies', 'search'] },
      ];

      const userScripts = [
        { name: 'install.py', description: 'Unified installer (fresh install, flags for headless/dev-tools).' },
        { name: 'startup.py', description: 'Starts API and frontend services.' },
        { name: 'restart_services.py', description: 'Restarts running services without reinstalling.' },
        { name: 'reset.py', description: 'Reset environment (drop DB, clear state) with confirmation.' },
        { name: 'run_migration.py', description: 'Runs migrations manually (post-install maintenance).' },
        { name: 'uninstall.py', description: 'Stops services and removes installed artifacts.' },
      ];

      const state = {
        selected: 'overview',
        inventories: {
          health: null,
          flows: null,
          techStack: null,
          apiCatalog: null,
          mcpTools: null,
          agentsTemplates: null,
          dbSchema: null,
          dependencyIndex: null,
          searchIndex: null,
        },
        errors: {},
        searchQuery: '',
      };

      const statusBanner = document.getElementById('status-banner');
      const badgeContainer = document.getElementById('badge-container');
      const navGroupsEl = document.getElementById('nav-groups');
      const sectionTitle = document.getElementById('section-title');
      const sectionDescription = document.getElementById('section-description');
      const contentEl = document.getElementById('content');
      const searchInput = document.getElementById('search-input');

      navGroupsEl.innerHTML = navGroups
        .map((group) => {
          const entries = group.items
            .map((id) => {
              const section = sections.find((s) => s.id === id);
              return `<li><button data-section="${section.id}"><span>${section.label}</span><small>${section.endpoint}</small></button></li>`;
            })
            .join('');
          return `<div class="nav-group"><h3>${group.title}</h3><ul>${entries}</ul></div></details>`;
        })
        .join('');

      navGroupsEl.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          selectSection(button.dataset.section);
        });
      });

      searchInput.addEventListener('input', (event) => {
        state.searchQuery = event.target.value.trim();
        render();
      });

      async function fetchInventories() {
        statusBanner.textContent = 'Loading inventories…';
        try {
          const healthData = await fetchJson('health');
          state.inventories.health = healthData;
          const fetchMap = {
            flows: 'flows',
            techStack: 'tech-stack',
            apiCatalog: 'api-catalog',
            mcpTools: 'mcp-tools',
            agentsTemplates: 'agents-templates',
            dbSchema: 'db-schema',
            dependencyIndex: 'dependency-index',
            searchIndex: 'search-index',
          };

          await Promise.all(
            Object.entries(fetchMap).map(async ([key, endpoint]) => {
              try {
                state.inventories[key] = await fetchJson(endpoint);
              } catch (error) {
                state.errors[key] = error.message;
              }
            })
          );

          statusBanner.textContent = 'Inventories loaded successfully';
          statusBanner.style.background = 'rgba(52,211,153,0.15)';
          statusBanner.style.color = 'var(--success)';
        } catch (error) {
          statusBanner.textContent = error.message;
          statusBanner.style.background = 'rgba(248,113,113,0.18)';
          statusBanner.style.color = 'var(--danger)';
        }
        render();
      }

      async function fetchJson(endpoint) {
        const response = await fetch(`${API_ROOT}/${endpoint}`);
        if (!response.ok) {
          throw new Error(`Failed to load ${endpoint} (${response.status})`);
        }
        return response.json();
      }

      function selectSection(id) {
        state.selected = id;
        render();
      }

      function render() {
        navGroupsEl.querySelectorAll('button').forEach((button) => {
          button.classList.toggle('active', button.dataset.section === state.selected);
        });

        const section = sections.find((s) => s.id === state.selected);
        sectionTitle.textContent = section.label;
        sectionDescription.textContent = section.description;

        renderBadges();

        if (state.searchQuery) {
          renderSearchResults();
          return;
        }

        switch (section.id) {
          case 'overview':
            renderOverview();
            break;
          case 'architecture':
            renderArchitecture();
            break;
          case 'tech-stack':
            renderTechStack();
            break;
          case 'apis':
            renderApiCatalog();
            break;
          case 'mcp-tools':
            renderMcpTools();
            break;
          case 'agents-templates':
            renderAgentTemplates();
            break;
          case 'database':
            renderDatabaseSchema();
            break;
          case 'dependencies':
            renderDependencies();
            break;
          case 'search':
            renderSearchIndex();
            break;
          default:
            contentEl.innerHTML = '<div class="muted">No renderer configured.</div>';
        }
      }

      function renderBadges() {
        const entries = [];
        const health = state.inventories.health;
        if (health?.inventories) {
          const ready = Object.values(health.inventories).filter(Boolean).length;
          const total = Object.keys(health.inventories).length;
          entries.push(`<span class="badge">Inventories ready: ${ready}/${total}</span>`);
          entries.push(`<span class="badge" style="background: rgba(148,163,184,0.15); color: var(--text-secondary);">Index dir: ${health.index_dir}</span>`);
        }
        badgeContainer.innerHTML = entries.join('');
      }

      function renderOverview() {
        const health = state.inventories.health;
        const apiCatalog = state.inventories.apiCatalog;
        const mcp = state.inventories.mcpTools;
        const tech = state.inventories.techStack;

        const cards = [];
        if (health?.inventories) {
          const ready = Object.entries(health.inventories)
            .map(([name, ok]) => `<li>${name} <span class="chip ${ok ? 'chip--success' : 'chip--danger'}">${ok ? 'Ready' : 'Missing'}</span></li>`)
            .join('');
          cards.push(`<article class="card"><h3>Inventory Files</h3><ul class="list-column">${ready}</ul></article>`);
        }

        const scripts = userScripts
          .map((script) => `<li><strong>${script.name}</strong> – ${script.description}</li>`)
          .join('');
        cards.push(`<article class="card"><h3>CLI Entry Points</h3><ul class="list-column">${scripts}</ul></article>`);

        if (apiCatalog?.success) {
          const groups = Object.keys(apiCatalog.grouped || {}).length;
          cards.push(`<article class="card"><h3>API Routes</h3><p>${apiCatalog.total} routes across ${groups} domain groups.</p></article>`);
        }

        if (mcp?.success) {
          cards.push(`<article class="card"><h3>MCP Tools</h3><p>${mcp.data.total_count} tools in ${mcp.data.categories.length} categories.</p></article>`);
        }

        if (tech?.success) {
          const deps = tech.python?.dependencies?.length || 0;
          const frontend = tech.frontend?.dependencies ? Object.keys(tech.frontend.dependencies).length : 0;
          cards.push(`<article class="card"><h3>Tech Stack</h3><p>${deps} backend deps · ${frontend} frontend deps.</p></article>`);
        }

        contentEl.innerHTML = `<div class="card-grid">${cards.join('')}</div>`;
      }

      const curatedFlows = {
        installation: {
          title: 'Installation (install.py)',
          summary: 'Unified installer workflow from CLI execution to first admin login.',
          lanes: [
            {
              name: 'Installer CLI',
              steps: [
                { label: 'Run `python install.py`', tooltip: 'User executes the unified installer from repo root.' },
                { label: 'Environment Detection', tooltip: 'Detect OS, ensure Python, pip, and platform prerequisites are available.' },
                { label: 'Prompts & Flags', tooltip: 'Support for --headless, --config-only, --dev-tools, and other CLI switches.' },
              ],
            },
            {
              name: 'System Tasks',
              steps: [
                { label: 'Database Setup', tooltip: 'Create/PostgreSQL database, run migrations, seed system templates.' },
                { label: 'Service Configuration', tooltip: 'Write config.yaml, .env defaults, generate secrets/keys.' },
                { label: 'Optional Dev Tools', tooltip: 'When --dev-tools, provision dev panel env and utilities.' },
              ],
            },
            {
              name: 'Post-Install',
              steps: [
                { label: 'Admin Onboarding', tooltip: 'Launch /welcome to create the first admin if user count = 0.' },
                { label: 'Setup State Snapshot', tooltip: 'Record setup_state so API knows installation completed.' },
                { label: 'Ready for Login', tooltip: 'Redirect to /login with API + Frontend services running.' },
              ],
            },
          ],
          references: [
            'docs/INSTALLATION_FLOW_PROCESS.md',
            'tests/installer/test_fresh_install_flow.py',
            'tests/installer/integration/test_installation_flow.py',
          ],
          cliFlags: [
            { flag: '--headless', description: 'Run without interactive prompts (use environment variables).' },
            { flag: '--pg-password <value>', description: 'Provide database password non-interactively.' },
            { flag: '--install-dir <path>', description: 'Customize installation directory.' },
            { flag: '--no-start-services', description: 'Skip starting API/frontend after installation.' },
            { flag: '--dev-tools', description: 'Provision optional developer tooling (devpanel).' },
            { flag: '--api-port/--frontend-port', description: 'Override default service ports.' },
            { flag: '--skip-venv/--skip-database', description: 'Reuse existing venv or database.' },
            { flag: '--config-only', description: 'Regenerate config files without DB changes.' },
            { flag: '--verbose', description: 'Enable verbose logging for debugging.' },
          ],
        },
        tasks: {
          title: 'Task Creation & Conversion',
          summary: 'Creating tasks via UI or MCP, assigning products, and escalating to projects.',
          lanes: [
            {
              name: 'User Interface',
              steps: [
                { label: 'Open Tasks → New Task', tooltip: 'User opens the Tasks module, selects “New Task”.' },
                { label: 'Select Product', tooltip: 'If active product exists, default is applied; otherwise prompt to choose.' },
                { label: 'Assign & Save', tooltip: 'Choose assignee (agent/human), set priority, due date, context budget.' },
                { label: 'Convert to Project', tooltip: 'Optional: escalate task to project; move to staging workflow.' },
              ],
            },
            {
              name: 'Backend / API',
              steps: [
                { label: 'POST /api/v1/tasks', tooltip: 'Validate payload, link to product, enforce quotas.' },
                { label: 'Agent Notifications', tooltip: 'Emit WebSocket events to subscribed agents for new work items.' },
                { label: 'Conversion Endpoint', tooltip: 'Tasks → Project APIs trigger orchestrator with task context.' },
              ],
            },
            {
              name: 'MCP & CLI',
              steps: [
                { label: '`list_tasks` / `create_task` tools', tooltip: 'CLI or MCP can create tasks programmatically.' },
                { label: 'No Active Product', tooltip: 'Requests without active product cause validation message; user must set active product first.', type: 'warning' },
                { label: 'Active Product', tooltip: 'Tasks link directly to the tenant’s active product context.', type: 'success' },
                { label: 'Slash Commands', tooltip: '`/gil_create_task` (planned) can route task creation via CLI instructions.' },
              ],
            },
          ],
          references: [
            'docs/AGENT_JOBS_API_REFERENCE.md',
            'tests/integration/test_agent_workflow.py',
            'src/giljo_mcp/tools/task.py',
          ],
        },
      };

      function renderArchitecture() {
        const flows = state.inventories.flows;
        let outlineHTML = '';
        if (flows?.success) {
          const timelineBlocks = Object.entries(flows.flows)
            .filter(([filename]) => !filename.includes('start_to_finish_agent_FLOW'))
            .map(([filename, flow]) => {
            const sections = (flow.sections || []).map((section) => `<div class="timeline-item">
                  <h4>${section.title}</h4>
                  <small>Level ${section.level}</small>
                </div>`).join('');
            return `<article class="card">
                <div class="section-heading"><h3 class="flow-file">${filename}</h3><span>${flow.sections.length} checkpoints</span></div>
                <div class="timeline">${sections}</div>
              </article>`;
          }).join('');
          outlineHTML = `<details open><summary>Outline Flows</summary><div class="collapsible-content">${timelineBlocks}</div></details>`;
        } else {
          outlineHTML = renderError(state.errors.flows || 'Flow inventory unavailable.');
        }

        const curatedHTML = ['installation', 'tasks'].map((key) => renderCuratedFlow(key)).join('');

        const jumpNav = `<div class="flow-nav"><label for="flow-jump">Jump to flow:</label><select id="flow-jump"><option value="">Select…</option><option value="flow-installation-wrapper">Installation Flow</option><option value="flow-tasks-wrapper">Task Creation Flow</option></select></div>`;

        contentEl.innerHTML = `<div class="flow-wrapper">${jumpNav}${outlineHTML}${curatedHTML}</div>`;

        const flowJump = document.getElementById('flow-jump');
        if (flowJump) {
          flowJump.addEventListener('change', (event) => {
            const target = event.target.value;
            if (!target) return;
            const el = document.getElementById(target);
            if (el) {
              el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
          });
        }
      }

      function renderCuratedFlow(key) {
        const flow = curatedFlows[key];
        if (!flow) return '';

        const lanes = flow.lanes.map((lane) => {
          const steps = lane.steps.map((step) => {
            const attr = step.type ? ` data-type="${step.type}"` : '';
            const tooltip = step.tooltip ? ` title="${step.tooltip.replace(/"/g, '&quot;')}"` : '';
            const status = step.type === 'success' ? '<span class="chip chip--success">OK</span>' : step.type === 'warning' ? '<span class="chip chip--danger">Attention</span>' : '';
            return `<div class="flow-step"${attr}${tooltip}><strong>${step.label}</strong>${step.tooltip ? `<p>${step.tooltip}</p>` : ''}${status ? `<footer>${status}</footer>` : ''}</div>`;
          }).join('');
          return `<div class="flow-lane"><h5>${lane.name}</h5><div class="flow-steps">${steps}</div></div>`;
        }).join('');

        const references = flow.references?.map((ref) => `<span class="chip">${ref}</span>`).join('') || '';

        return `<details open class="flow-diagram" id="flow-${key}-wrapper"><summary>${flow.title}</summary><div class="collapsible-content">
            <header><h4>${flow.title}</h4><span>${flow.summary}</span></header>
            <div class="flow-lanes">${lanes}</div>
            ${references ? `<div class="list-inline">${references}</div>` : ''}
            ${flow.cliFlags ? `<div class="detail-box" style="margin-top:8px;"><strong>${flow.title.split(' ')[0]} CLI Flags</strong><ul class="list-column">${flow.cliFlags.map((flag) => `<li><code>${flag.flag}</code> – ${flag.description}</li>`).join('')}</ul></div>` : ''}
          </div></details>`;
      }


      function renderTechStack() {
        const tech = state.inventories.techStack;
        if (!tech?.success) {
          contentEl.innerHTML = renderError(state.errors.techStack || 'Tech stack data unavailable.');
          return;
        }

        const backendRows = (tech.python?.dependency_info || []).map((dep) => `
            <tr>
              <td>${dep.name}</td>
              <td>${dep.requirement}</td>
              <td>${dep.installed_version || '<span class="muted">n/a</span>'}</td>
              <td>${dep.latest_version || '<span class="muted">n/a</span>'}</td>
              <td>${renderUpgradeChip(dep.upgrade_available)}</td>
            </tr>
          `).join('');

        const frontendRows = (tech.frontend?.dependency_info || []).map((dep) => `
            <tr>
              <td>${dep.name}</td>
              <td>${dep.declared_version}</td>
              <td>${dep.latest_version || '<span class="muted">n/a</span>'}</td>
              <td>${renderUpgradeChip(dep.upgrade_available)}</td>
            </tr>
          `).join('');

        const deprecations = (tech.deprecations || []).map((dep) => `<li>${dep.text}${dep.source ? ` <span class="chip">${dep.source}</span>` : ''}</li>`).join('');

        contentEl.innerHTML = `
          <div class="section-block">
            <div class="card">
              <div class="section-heading"><h3>Backend Packages</h3><span>${backendRows ? 'Installed vs. latest (PyPI)' : 'No data'}</span></div>
              <table class="table">
                <thead><tr><th>Name</th><th>Requirement</th><th>Installed</th><th>Latest</th><th>Status</th></tr></thead>
                <tbody>${backendRows || '<tr><td colspan="5" class="muted">No dependencies detected.</td></tr>'}</tbody>
              </table>
            </div>
            <div class="card">
              <div class="section-heading"><h3>Frontend Packages</h3><span>${frontendRows ? 'Declared vs. latest (npm)' : 'No data'}</span></div>
              <table class="table">
                <thead><tr><th>Name</th><th>Declared</th><th>Latest</th><th>Status</th></tr></thead>
                <tbody>${frontendRows || '<tr><td colspan="4" class="muted">No dependencies detected.</td></tr>'}</tbody>
              </table>
            </div>
            <div class="card">
              <div class="section-heading"><h3>Deprecations & Watchlist</h3><span>${(tech.deprecations || []).length} items</span></div>
              <ul class="list-column">${deprecations || '<span class="muted">No warnings recorded.</span>'}</ul>
            </div>
          </div>
        `;
      }

      function renderUpgradeChip(upgrade) {
        if (upgrade === true) {
          return '<span class="chip chip--danger">Upgrade Available</span>';
        }
        if (upgrade === false) {
          return '<span class="chip chip--success">Up-to-date</span>';
        }
        return '<span class="chip">Unknown</span>';
      }

      function renderApiCatalog() {
        const apiCatalog = state.inventories.apiCatalog;
        if (!apiCatalog?.success) {
          contentEl.innerHTML = renderError(state.errors.apiCatalog || 'API catalog unavailable.');
          return;
        }

        const groups = Object.entries(apiCatalog.grouped || {}).map(([tag, routes]) => {
          const rows = routes
            .map((route) => `<div class="card">
                <div class="section-heading"><h3>${route.methods.join(', ')} ${route.path}</h3><span>${route.endpoint}</span></div>
                <p>${route.summary || 'No summary'}</p>
                <div class="list-inline">${route.tags.map((tag) => `<span class="chip">${tag}</span>`).join('')}</div>
              </div>`)
            .join('');
          return `<details open><summary>${tag} <span class="muted">${routes.length} routes</span></summary><div class="collapsible-content"><div class="card-grid">${rows}</div></div></details>`;
        }).join('');

        contentEl.innerHTML = groups;
      }

      function renderMcpTools() {
        const mcp = state.inventories.mcpTools;
        if (!mcp?.success) {
          contentEl.innerHTML = renderError(state.errors.mcpTools || 'MCP tool catalog unavailable.');
          return;
        }

        const categories = Object.entries(mcp.data.tools || {}).map(([category, tools]) => {
          const items = tools.map((tool) => `<div class="card">
              <div class="section-heading"><h3>${tool.name}</h3><span>${category}</span></div>
              <p>${tool.description || 'No description provided.'}</p>
              ${tool.arguments ? `<ul class="list-column">${Object.entries(tool.arguments).map(([key, desc]) => `<li><strong>${key}</strong> – ${desc}</li>`).join('')}</ul>` : ''}
            </div>`).join('');
          return `<details open><summary>${category} <span class="muted">${tools.length} tools</span></summary><div class="collapsible-content"><div class="card-grid">${items}</div></div></details>`;
        }).join('');

        contentEl.innerHTML = categories;
      }

      function renderAgentTemplates() {
        const templates = state.inventories.agentsTemplates;
        if (!templates?.success) {
          contentEl.innerHTML = renderError(state.errors.agentsTemplates || 'Template catalog unavailable.');
          return;
        }

        const cards = templates.templates.map((tpl) => {
          const rules = (tpl.behavioral_rules || []).map((rule) => `<li>${rule}</li>`).join('');
          const success = (tpl.success_criteria || []).map((item) => `<li>${item}</li>`).join('');
          return `<details><summary>${tpl.name} <span class="muted">${tpl.role}</span></summary>
              <div class="collapsible-content">
              <div class="card">
              <p>${tpl.description || 'No description provided.'}</p>
              <div class="detail-grid">
                <div class="detail-box"><strong>Defaults</strong><div class="list-column">
                  <span>Model: ${tpl.model || 'n/a'}</span>
                  <span>CLI Tool: ${tpl.cli_tool || 'n/a'}</span>
                  <span>Version: ${tpl.version || 'n/a'}</span>
                  <span>Status: <span class="chip ${tpl.is_active ? 'chip--success' : 'chip--danger'}">${tpl.is_active ? 'Active' : 'Inactive'}</span></span>
                </div></div>
                <div class="detail-box"><strong>Variables</strong>${tpl.variables?.length ? `<div class="list-column">${tpl.variables.map((v) => `<span>${v}</span>`).join('')}</div>` : '<span class="muted">None listed</span>'}</div>
              </div>
              <div class="section-block">
                <div class="detail-box"><strong>Behavioral Rules</strong><ul class="list-column">${rules || '<span class="muted">No rules defined.</span>'}</ul></div>
                <div class="detail-box"><strong>Success Criteria</strong><ul class="list-column">${success || '<span class="muted">No criteria defined.</span>'}</ul></div>
              </div>
            </div>
            </div>
            </details>`;
        }).join('');

        contentEl.innerHTML = `<div class="section-block">${cards}</div>`;
      }

      function renderDatabaseSchema() {
        const db = state.inventories.dbSchema;
        if (!db?.success) {
          contentEl.innerHTML = renderError(state.errors.dbSchema || 'DB schema unavailable.');
          return;
        }

        const tables = Object.entries(db.tables || {}).map(([tableName, table]) => {
          const columns = table.columns
            .map((col) => `<tr><td>${col.name}</td><td>${col.type}</td><td>${col.primary_key ? 'PK' : ''}</td><td>${col.nullable ? 'Yes' : 'No'}</td></tr>`)
            .join('');
          const fks = table.foreign_keys?.length
            ? table.foreign_keys.map((fk) => `<li>${fk.column} → ${fk.ref}</li>`).join('')
            : '<span class="muted">None</span>';
          const idx = table.indexes?.length
            ? table.indexes.map((index) => `<li>${index.name} – ${index.columns.join(', ')}</li>`).join('')
            : '<span class="muted">None</span>';
          return `<details><summary>${tableName} <span class="muted">${table.columns.length} columns</span></summary>
              <div class="collapsible-content">
              <div class="card">
              <table class="table">
                <thead><tr><th>Name</th><th>Type</th><th>Key</th><th>Nullable</th></tr></thead>
                <tbody>${columns}</tbody>
              </table>
              <div class="detail-grid">
                <div class="detail-box"><strong>Foreign Keys</strong><div class="list-column">${fks}</div></div>
                <div class="detail-box"><strong>Indexes</strong><div class="list-column">${idx}</div></div>
              </div>
            </div>
            </div>
            </details>`;
        }).join('');

        contentEl.innerHTML = `<div class="section-block">${tables}</div>`;
      }

      function renderDependencies() {
        const deps = state.inventories.dependencyIndex;
        if (!deps?.success) {
          contentEl.innerHTML = renderError(state.errors.dependencyIndex || 'Dependency index unavailable.');
          return;
        }

        const modules = Object.entries(deps.modules || {}).map(([module, imports]) => `<tr><td>${module}</td><td>${imports.slice(0, 6).join(', ')}</td></tr>`).join('');
        contentEl.innerHTML = `
          <div class="card">
            <div class="section-heading"><h3>Modules</h3><span>${Object.keys(deps.modules || {}).length} entries</span></div>
            <table class="table">
              <thead><tr><th>Module</th><th>Imports (sample)</th></tr></thead>
              <tbody>${modules}</tbody>
            </table>
            <p class="muted">Showing first-level import graph. Use search to drill deeper.</p>
          </div>
        `;
      }

      function renderSearchIndex() {
        const index = state.inventories.searchIndex;
        if (!index?.success) {
          contentEl.innerHTML = renderError(state.errors.searchIndex || 'Search index unavailable.');
          return;
        }

        const entries = index.entries?.map((entry) => `<article class="card">
            <header><span class="chip">${entry.type}</span><h3>${entry.title}</h3></header>
            <p>${entry.desc || 'No description.'}</p>
            <footer>
              ${(entry.tags || []).map((tag) => `<span class="chip">${tag}</span>`).join('')}
              <span class="muted">${entry.source || ''}</span>
            </footer>
          </article>`).join('');
        contentEl.innerHTML = `<div class="section-block">${entries || renderError('Search index empty.')}</div>`;
      }

      function renderSearchResults() {
        const index = state.inventories.searchIndex;
        if (!index?.success || !index.entries) {
          contentEl.innerHTML = renderError('Search index unavailable.');
          return;
        }
        const term = state.searchQuery.toLowerCase();
        const results = index.entries.filter((entry) => {
          const inTitle = (entry.title || '').toLowerCase().includes(term);
          const inDesc = (entry.desc || '').toLowerCase().includes(term);
          const inTags = (entry.tags || []).some((tag) => (tag || '').toLowerCase().includes(term));
          return inTitle || inDesc || inTags;
        });

        if (!results.length) {
          contentEl.innerHTML = `<div class="search-results"><article><header><span class="chip">No results</span><h3>${state.searchQuery}</h3></header><p class="muted">Try a different keyword.</p></article></div>`;
          return;
        }

        const entriesHtml = results
          .map((entry) => `<article>
              <header><span class="chip">${entry.type}</span><h3>${entry.title}</h3></header>
              <p>${entry.desc || 'No description.'}</p>
              <footer>
                ${(entry.tags || []).map((tag) => `<span class="chip">${tag}</span>`).join('')}
                <span>${entry.source || ''}</span>
              </footer>
            </article>`)
          .join('');
        contentEl.innerHTML = `<div class="search-results">${entriesHtml}</div>`;
      }

      function renderError(message) {
        return `<div class="card" style="border: 1px solid rgba(248,113,113,0.45); background: rgba(248,113,113,0.08);">
            <h3 style="color: var(--danger); margin: 0 0 6px;">Inventory Error</h3>
            <p style="margin: 0;">${message}</p>
          </div>`;
      }

      fetchInventories();
    </script>
  </body>
</html>
