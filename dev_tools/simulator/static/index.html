<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GiljoAI Dev Tools Simulator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    header { padding: 10px 16px; background: #222; color: #fff; display:flex; align-items:center; gap:12px; }
    section { padding: 12px 16px; }
    .row { display:flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .tabs { display:flex; gap: 8px; border-bottom: 1px solid #ddd; padding: 8px 16px; }
    .tab { padding: 6px 10px; cursor: pointer; border: 1px solid #ccc; border-bottom: none; background:#f9f9f9; }
    .tab.active { background:#fff; border-bottom: 1px solid #fff; }
    .panel { display:none; padding: 12px 16px; }
    .panel.active { display:block; }
    textarea { width:100%; height: 180px; font-family: monospace; }
    input, button, select { padding: 6px; }
    .group { margin-bottom: 10px; }
  </style>
  <script>
    async function api(path, opts={}) {
      const res = await fetch(path, { method: opts.method || 'GET', headers: { 'Content-Type':'application/json' }, body: opts.body ? JSON.stringify(opts.body) : undefined });
      const text = await res.text();
      let data; try { data = JSON.parse(text); } catch { data = { raw: text } }
      return { status: res.status, data };
    }

    function log(targetId, obj) {
      const el = document.getElementById(targetId);
      const ts = new Date().toISOString();
      el.value = `[${ts}] ${JSON.stringify(obj)}\n` + el.value;
    }

    function switchTab(id) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-'+id).classList.add('active');
      document.getElementById('panel-'+id).classList.add('active');
    }

    window.addEventListener('DOMContentLoaded', async () => {
      switchTab('product');

      // Auth setup
      document.getElementById('btn-set-key').onclick = async () => {
        const apiKey = document.getElementById('api-key').value;
        const r = await api('/api/auth/api_key', { method:'POST', body:{ api_key: apiKey }});
        log('log-global', r);
      };
      document.getElementById('btn-login').onclick = async () => {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const r = await api('/api/auth/login', { method:'POST', body:{ username:u, password:p }});
        log('log-global', r);
      };

      // Process controls
      document.getElementById('btn-start-api').onclick = async () => {
        const port = document.getElementById('api-port').value || '7272';
        const r = await api('/api/process/start_api', { method:'POST', body:{ port: parseInt(port) }});
        log('log-global', r);
      };
      document.getElementById('btn-stop-api').onclick = async () => {
        const r = await api('/api/process/stop_api', { method:'POST' });
        log('log-global', r);
      };
      document.getElementById('btn-start-frontend').onclick = async () => {
        const port = document.getElementById('fe-port').value || '7274';
        const r = await api('/api/process/start_frontend', { method:'POST', body:{ port: parseInt(port) }});
        log('log-global', r);
      };
      document.getElementById('btn-stop-frontend').onclick = async () => {
        const r = await api('/api/process/stop_frontend', { method:'POST' });
        log('log-global', r);
      };
      document.getElementById('btn-status').onclick = async () => {
        const r = await api('/api/process/status');
        log('log-global', r);
      };

      // Product actions
      document.getElementById('btn-create-product').onclick = async () => {
        const name = document.getElementById('prod-name').value || `SIM_PRODUCT_${Date.now()}`;
        const r = await api('/api/sim/product/create', { method:'POST', body:{ name, description:'sim product' }});
        log('log-product', r);
      };
      document.getElementById('btn-activate-product').onclick = async () => {
        const id = document.getElementById('prod-id').value;
        const r = await api('/api/sim/product/activate', { method:'POST', body:{ product_id:id }});
        log('log-product', r);
      };
      document.getElementById('btn-deactivate-product').onclick = async () => {
        const id = document.getElementById('prod-id').value;
        const r = await api('/api/sim/product/deactivate', { method:'POST', body:{ product_id:id }});
        log('log-product', r);
      };
      document.getElementById('btn-delete-product').onclick = async () => {
        const id = document.getElementById('prod-id').value;
        const r = await api('/api/sim/product/delete', { method:'POST', body:{ product_id:id }});
        log('log-product', r);
      };
      document.getElementById('btn-upload-vision').onclick = async () => {
        const id = document.getElementById('prod-id').value;
        const file = document.getElementById('vision-file').files[0];
        if (!file) { alert('Choose a file'); return; }
        const text = await file.text();
        const b64 = btoa(unescape(encodeURIComponent(text)));
        const r = await api('/api/sim/product/vision_upload', { method:'POST', body:{ product_id:id, filename:file.name, content_b64:b64 }});
        log('log-product', r);
      };

      // Project actions
      document.getElementById('btn-create-project').onclick = async () => {
        const name = document.getElementById('proj-name').value || `SIM_PROJECT_${Date.now()}`;
        const product_id = document.getElementById('proj-product-id').value || null;
        const mission = document.getElementById('proj-mission').value || 'Sim mission';
        const r = await api('/api/sim/project/create', { method:'POST', body:{ name, mission, product_id }});
        log('log-project', r);
      };
      document.getElementById('btn-cancel-project').onclick = async () => {
        const id = document.getElementById('proj-id').value;
        const r = await api('/api/sim/project/cancel', { method:'POST', body:{ project_id:id, reason:'sim cancel' }});
        log('log-project', r);
      };
      document.getElementById('btn-restore-project').onclick = async () => {
        const id = document.getElementById('proj-id').value;
        const r = await api('/api/sim/project/restore', { method:'POST', body:{ project_id:id }});
        log('log-project', r);
      };

      // Task actions
      document.getElementById('btn-create-task').onclick = async () => {
        const title = document.getElementById('task-title').value || `SIM_TASK_${Date.now()}`;
        const product_id = document.getElementById('task-product-id').value || null;
        const project_id = document.getElementById('task-project-id').value || null;
        const r = await api('/api/sim/task/create', { method:'POST', body:{ title, description:'sim task', product_id, project_id }});
        log('log-task', r);
      };
      document.getElementById('btn-delete-task').onclick = async () => {
        const id = document.getElementById('task-id').value;
        const r = await api('/api/sim/task/delete', { method:'POST', body:{ task_id:id }});
        log('log-task', r);
      };
      // Convert task to project
      document.getElementById('btn-convert-task').onclick = async () => {
        const id = document.getElementById('task-id').value;
        const r = await api('/api/sim/task/convert', { method:'POST', body:{ task_id:id, strategy:'single', include_subtasks:true }});
        log('log-task', r);
      };

      // Jobs actions
      document.getElementById('btn-orchestrate').onclick = async () => {
        const id = document.getElementById('job-project-id').value;
        const r = await api('/api/sim/jobs/orchestrate', { method:'POST', body:{ project_id:id }});
        log('log-jobs', r);
      };
      document.getElementById('btn-workflow').onclick = async () => {
        const id = document.getElementById('job-project-id').value;
        const r = await api('/api/sim/jobs/workflow?project_id='+encodeURIComponent(id));
        log('log-jobs', r);
      };

      // Messaging
      document.getElementById('btn-send-msg').onclick = async () => {
        const to = document.getElementById('msg-to').value.split(',').map(x=>x.trim()).filter(Boolean);
        const content = document.getElementById('msg-content').value;
        const project_id = document.getElementById('msg-project-id').value;
        const r = await api('/api/sim/messages/send', { method:'POST', body:{ to_agents:to, content, project_id }});
        log('log-msg', r);
      };
      document.getElementById('btn-ack-msg').onclick = async () => {
        const id = document.getElementById('msg-id').value;
        const agent = document.getElementById('msg-agent').value || 'simulator';
        const r = await api('/api/sim/messages/ack', { method:'POST', body:{ message_id:id, agent_name:agent }});
        log('log-msg', r);
      };
      document.getElementById('btn-complete-msg').onclick = async () => {
        const id = document.getElementById('msg-id').value;
        const agent = document.getElementById('msg-agent').value || 'simulator';
        const result = document.getElementById('msg-result').value || 'ok';
        const r = await api('/api/sim/messages/complete', { method:'POST', body:{ message_id:id, agent_name:agent, result }});
        log('log-msg', r);
      };

      // MCP
      document.getElementById('btn-mcp-init').onclick = async () => {
        const r = await api('/api/sim/mcp/initialize', { method:'POST', body:{ client_info:{ name:'sim-ui'} }});
        log('log-mcp', r);
      };
      document.getElementById('btn-mcp-tools').onclick = async () => {
        const r = await api('/api/sim/mcp/tools_list', { method:'POST' });
        log('log-mcp', r);
      };

      // Dataset + Cleanup
      document.getElementById('btn-generate').onclick = async () => {
        const r = await api('/api/sim/dataset/generate', { method:'POST', body:{ products:10, projects_per_product:10, tasks_per_project:10 }});
        log('log-global', r);
      };
      document.getElementById('btn-cleanup').onclick = async () => {
        const r = await api('/api/sim/cleanup/created', { method:'POST' });
        log('log-global', r);
      };
      document.getElementById('btn-purge-sim').onclick = async () => {
        const r = await api('/api/sim/cleanup/purge_sim', { method:'POST' });
        log('log-global', r);
      };
    });
  </script>
  </head>
<body>
  <header>
    <div style="font-weight:bold">Dev Tools Simulator</div>
    <div class="row">
      <input id="api-key" placeholder="API Key (X-API-Key)" size="36" />
      <button id="btn-set-key">Use API Key</button>
      <input id="username" placeholder="username" />
      <input id="password" placeholder="password" type="password" />
      <button id="btn-login">Login</button>
      <input id="api-port" placeholder="API port" value="7272" size="6" />
      <button id="btn-start-api">Start API</button>
      <button id="btn-stop-api">Stop API</button>
      <input id="fe-port" placeholder="FE port" value="7274" size="6" />
      <button id="btn-start-frontend">Start FE</button>
      <button id="btn-stop-frontend">Stop FE</button>
      <button id="btn-status">Status</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" id="tab-product" onclick="switchTab('product')">Product</div>
    <div class="tab" id="tab-project" onclick="switchTab('project')">Project</div>
    <div class="tab" id="tab-task" onclick="switchTab('task')">Task</div>
    <div class="tab" id="tab-jobs" onclick="switchTab('jobs')">Jobs</div>
    <div class="tab" id="tab-msg" onclick="switchTab('msg')">Messaging</div>
    <div class="tab" id="tab-mcp" onclick="switchTab('mcp')">MCP</div>
  </div>

  <section>
    <div class="group">
      <button id="btn-generate">Generate Dataset (10x10x10)</button>
      <button id="btn-cleanup">Cleanup Created</button>
      <button id="btn-purge-sim">Purge SIM_* (Best Effort)</button>
    </div>
    <textarea id="log-global" placeholder="Global log..." ></textarea>
  </section>

  <div class="panel active" id="panel-product">
    <section>
      <div class="group row">
        <input id="prod-name" placeholder="Product name" />
        <button id="btn-create-product">Create Product</button>
      </div>
      <div class="group row">
        <input id="prod-id" placeholder="Product ID" size="40" />
        <button id="btn-activate-product">Activate</button>
        <button id="btn-deactivate-product">Deactivate</button>
        <button id="btn-delete-product">Delete</button>
      </div>
      <div class="group row">
        <input type="file" id="vision-file" accept=".md,.txt,.markdown" />
        <button id="btn-upload-vision">Upload Vision</button>
      </div>
      <textarea id="log-product" placeholder="Product log..." ></textarea>
    </section>
  </div>

  <div class="panel" id="panel-project">
    <section>
      <div class="group row">
        <input id="proj-name" placeholder="Project name" />
        <input id="proj-product-id" placeholder="Product ID (optional)" size="40" />
        <input id="proj-mission" placeholder="Mission" />
        <button id="btn-create-project">Create Project</button>
      </div>
      <div class="group row">
        <input id="proj-id" placeholder="Project ID" size="40" />
        <button id="btn-cancel-project">Cancel</button>
        <button id="btn-restore-project">Restore</button>
      </div>
      <textarea id="log-project" placeholder="Project log..." ></textarea>
    </section>
  </div>

  <div class="panel" id="panel-task">
    <section>
      <div class="group row">
        <input id="task-title" placeholder="Task title" />
        <input id="task-product-id" placeholder="Product ID" size="40" />
        <input id="task-project-id" placeholder="Project ID" size="40" />
        <button id="btn-create-task">Create Task</button>
      </div>
      <div class="group row">
        <input id="task-id" placeholder="Task ID" size="40" />
        <button id="btn-delete-task">Delete Task</button>
        <button id="btn-convert-task">Convert → Project</button>
      </div>
      <textarea id="log-task" placeholder="Task log..." ></textarea>
    </section>
  </div>

  <div class="panel" id="panel-jobs">
    <section>
      <div class="group row">
        <input id="job-project-id" placeholder="Project ID" size="40" />
        <button id="btn-orchestrate">Orchestrate</button>
        <button id="btn-workflow">Workflow Status</button>
      </div>
      <textarea id="log-jobs" placeholder="Jobs log..." ></textarea>
    </section>
  </div>

  <div class="panel" id="panel-msg">
    <section>
      <div class="group row">
        <input id="msg-to" placeholder="to_agents (comma-separated)" />
        <input id="msg-project-id" placeholder="Project ID" size="40" />
        <input id="msg-content" placeholder="Message content" />
        <button id="btn-send-msg">Send</button>
      </div>
      <div class="group row">
        <input id="msg-id" placeholder="Message ID" size="40" />
        <input id="msg-agent" placeholder="Agent name" value="simulator" />
        <input id="msg-result" placeholder="Result (for complete)" value="ok" />
        <button id="btn-ack-msg">Acknowledge</button>
        <button id="btn-complete-msg">Complete</button>
      </div>
      <textarea id="log-msg" placeholder="Messaging log..." ></textarea>
    </section>
  </div>

  <div class="panel" id="panel-mcp">
    <section>
      <div class="group row">
        <button id="btn-mcp-init">Initialize</button>
        <button id="btn-mcp-tools">Tools List</button>
      </div>
      <textarea id="log-mcp" placeholder="MCP log..." ></textarea>
    </section>
  </div>

</body>
</html>
